$kind: http-request
description: |-
  Updates a region.

  Parameters:

  | Parameter | In | Type | Required | Default | Description |
  |---|---|---|---|---|---|
  | regionID | path | integer | yes |  | Region identifier |
  | name | body | string | no |  | New name |
  | parentRegionID | body | integer | no |  | New parent (≥ 1) |
url: "{{protocol}}://{{server}}:{{port}}/v2/regions/:regionID"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  regionID: "123"
body:
  type: text
  content: |-
    {
      "name": "Northwest",
      "parentRegionID": 1
    }
examples: ./.resources/Update Region.resources/examples
order: 3000
