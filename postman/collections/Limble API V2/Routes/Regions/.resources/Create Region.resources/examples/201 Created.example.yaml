$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/regions"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "name": "North Region",
        "parentRegionID": 0
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Location: /v2/regions?regions=123
  body:
    type: text
    content: |-
      { 
        "regionID": 123
       }
order: 1000
