$kind: http-request
description: This request adds a User to a Team.
url: "{{protocol}}://{{server}}:{{port}}/v2/users/:userID/teams"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: userID
    value: "{{userID}}"
    description: userID of the user you are adding a team to.
body:
  type: text
  content: |-
    {
    	"locationID": {{locationID}},
    	"teamID": {{teamID}}
    }
scripts:
  - type: afterResponse
    code: "pm.test(\"response must be valid and have a body\", function () {\r

      \     // assert that the status code is 200\r

      \     pm.response.to.be.ok; // info, success, redirection,
      clientError,  serverError, are other variants\r

      \     pm.response.to.not.have.jsonBody(\"error\"); \r

      });"
    language: text/javascript
examples: ./.resources/Add User To Team.resources/examples
order: 2000
