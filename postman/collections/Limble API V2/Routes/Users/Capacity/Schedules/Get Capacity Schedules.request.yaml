$kind: http-request
description: >-
  Returns per-user daily capacity rows for a date range, including applied
  precedence details.


  Precedence order:

  `exception > holiday > userSchedule > profileSchedule > default`.


  Pagination:

  - `cursor` is a zero-based offset.

  - `limit` max is 100.


  Date limits:

  - `startDate` and `endDate` are required (YYYY-MM-DD).

  - Date range cannot exceed 31 days.


  Response notes:

  - `range` now contains only `startDate` and `endDate`.

  - `pagination` contains `cursor`, `limit`, `totalUsers`, and `nextCursor`.
url: "{{protocol}}://{{server}}:{{port}}/v2/users/capacity/schedules?locations=\
  1,3&users=42,57&startDate=2026-01-05&endDate=2026-01-07&cursor=0&limit=100"
method: GET
queryParams:
  - key: locations
    value: 1,3
    description: Required comma-separated location IDs to scope users.
  - key: users
    value: 42,57
    description: Optional comma-separated user IDs filter.
  - key: startDate
    value: 2026-01-05
    description: Required start date (YYYY-MM-DD).
  - key: endDate
    value: 2026-01-07
    description: Required end date (YYYY-MM-DD), must be >= startDate and within 31 days.
  - key: cursor
    value: "0"
    description: Optional zero-based user offset for pagination.
  - key: limit
    value: "100"
    description: Optional page size (1-100).
examples: ./.resources/Get Capacity Schedules.resources/examples
order: 1000
