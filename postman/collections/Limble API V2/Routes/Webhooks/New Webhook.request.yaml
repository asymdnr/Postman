$kind: http-request
description: >-
  This requests creates a new Webhook.


  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr>
  			<td>endpoint</td>
  			<td>URL</td>
  			<td>Required</td>
  			<td>The webhook URL.</td>
  		</tr>
  		<tr>
  			<td>type</td>
  			<td>String</td>
  			<td>Required</td>
  			<td>The type of webhook. Refer to GET webhooks for type values</td>
  		</tr>
  		<tr>
  			<td>enabled</td>
  			<td>Int</td>
  			<td>Optional</td>
  			<td>Should the webhook be enabled or disabled. It is enabled(1) by default.</td>
  		</tr>
  	</tbody>
url: "{{protocol}}://{{server}}:{{port}}/v2/webhooks/"
method: POST
body:
  type: json
  content: "{\r

    \    \"endpoint\": \"https://hello.com\",\r

    \    \"type\": \"assetField\",\r

    \    \"enabled\": 0\r

    }"
examples: ./.resources/New Webhook.resources/examples
order: 3000
