$kind: http-request
description: |-
  This request updates a Priority.

  **When providing priorityLevel or isDefault, calls to this endpoint may reorder or otherwise adjust** _**other**_ **priorities.**

  <table><tbody><tr><th>Parameter</th><th>Type</th><th>Required?</th><th>Description</th></tr><tr><td><div>name</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>String</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The title of this priority.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>priorityLevel</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Int</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>What level is this priority? When moving a priority to a different priorityLevel, be mindful that this will shift other priorities' priorityLevels in order to accommodate this change. If provided, this can only be between the numbers 1 and the current highest priorityLevel.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>color</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>String</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>This is the color that will be shown on all tasks with this priority.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>isDefault</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Boolean</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Should this be the default priority that tasks are assigned to when a priority is not specified? When setting this to true, any other priorities whose isDefault is true will have it set to false.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/priorities/:priorityID"
method: PATCH
pathVariables:
  priorityID: "1191"
body:
  type: json
  content: |
    {
        "name": "On Hold",
        "isDefault": true
    }
examples: ./.resources/Update Priority.resources/examples
order: 2000
