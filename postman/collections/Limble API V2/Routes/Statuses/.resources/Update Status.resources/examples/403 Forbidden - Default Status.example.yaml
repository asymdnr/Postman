$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/statuses/:statusID"
  method: PATCH
  headers:
    Content-Type: application/json
  pathVariables:
    - key: statusID
      value: "10"
      description: The ID of the status to update
  body:
    type: json
    content: |-
      {
        "name": "On Hold",
        "description": "Task temporarily paused",
        "sortOrder": 5
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "success": false,
        "message": "Default statuses (0, 1, 2) cannot be modified"
      }
order: 2000
