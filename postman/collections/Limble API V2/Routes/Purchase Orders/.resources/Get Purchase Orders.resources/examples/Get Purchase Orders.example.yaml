$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/po?pos=1&vendors=9&locations=163&nu\
    mbers=1&cursor=0&limit=500&lastEditedStart=1629737835&lastEditedEnd=1630121\
    871&status=97,99"
  method: GET
  queryParams:
    - key: pos
      value: "1"
      description: This parameter is used to only get specific POs. This parameter
        expects a comma delimited list of PO IDs.
    - key: vendors
      value: "9"
      description: This parameter is used to only get specific Vendors. This parameter
        expects a comma delimited list of Vendor IDs.
    - key: locations
      value: "163"
      description: This parameter is used to only get POs at a specific group of
        Locations. This parameter accepts a comma delimited list of Location
        IDs.
    - key: numbers
      value: "1"
      description: This parameter is used to only get specific POs by Number. This
        parameter expects a comma delimited list of PO Numbers.
    - key: cursor
      value: "0"
      description: This parameter is a cursor that selects what poID you want to start
        receiving results at. e.g. passing 137 here will only get you PO with an
        id greater than 137.
    - key: limit
      value: "500"
      description: This parameter is a result limiter. The default is set to return no
        more than 100 results at one time.
    - key: lastEditedStart
      value: "1629737835"
      description: This parameter is used to only get POs that were last edited after
        the unix timestamp passed into the start parameter. For example, all POs
        that were last edited after April 18th, 2018.
    - key: lastEditedEnd
      value: "1630121871"
      description: This parameter is used to only get POs that were last edited
        *before* the unix timestamp passed in.
    - key: status
      value: 97,99
      description: This parameter is used to only get POs for a specific group of status.
    - key: page
      value: null
      disabled: true
      description: This parameter is used to paginate results based on the limit.
        Refer to Pagination section for more information.
