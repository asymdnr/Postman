$kind: http-request
description: >-
  This request creates a new Purchase Order.


  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr>
  			<td>locationID</td>
  			<td>Int</td>
  			<td>Required</td>
  			<td>The ID of the location this PO will be created for.</td>
  		</tr>
  		<tr>
  			<td>vendorID</td>
  			<td>Int</td>
  			<td>Required</td>
  			<td>The ID of the vendor that this PO will be associated with.</td>
  		</tr>
  		<tr>
  			<td>userID</td>
  			<td>Int</td>
  			<td>Required</td>
  			<td>The ID of the user that this PO will be assigned to.</td>
  		</tr>
  		<tr>
  			<td>taskID</td>
  			<td>Int</td>
  			<td>Optional</td>
  			<td>The ID of the task that this PO will be associated with.</td>
  		</tr>
  		<tr>
  			<td>budgetID</td>
  			<td>Int</td>
  			<td>Optional</td>
  			<td>The ID of the budget that this PO will be associated with. If not provided, this will be the location's default budget.</td>
  		</tr>
  		<tr>
  			<td>date</td>
  			<td>Int</td>
  			<td>Optional</td>
  			<td>The start time of the PO -- this can be in the past or the future and will still show up in the UI. Must be a <a href="https://www.unixtimestamp.com/" target="_blank">unix timestamp</a>. If not provided, this will default to the current time.</td>
  		</tr>
  		<tr>
  			<td>expectedDate</td>
  			<td>Int</td>
  			<td>Optional</td>
  			<td>The expected delivery date of this PO. Must be a <a href="https://www.unixtimestamp.com/" target="_blank">unix timestamp</a>.</td>
  		</tr>
  		<tr>
  			<td>requestDescription</td>
  			<td>String</td>
  			<td>Optional</td>
  			<td>A description of the "request" for this PO.</td>
  		</tr>
  		<tr>
  			<td>customField1</td>
  			<td>String</td>
  			<td>Optional</td>
  			<td>PO custom field, the customer chooses which custom fields are available on all POs.</td>
  		</tr>
  		<tr>
  			<td>customField2</td>
  			<td>String</td>
  			<td>Optional</td>
  			<td>PO custom field, the customer chooses which custom fields are available on all POs.</td>
  		</tr>
  		<tr>
  			<td>customField3</td>
  			<td>String</td>
  			<td>Optional</td>
  			<td>PO custom field, the customer chooses which custom fields are available on all POs.</td>
  		</tr>
  		<tr>
  			<td>customField4</td>
  			<td>String</td>
  			<td>Optional</td>
  			<td>PO custom field, the customer chooses which custom fields are available on all POs.</td>
  		</tr>
  		<tr>
  			<td>customField5</td>
  			<td>String</td>
  			<td>Optional</td>
  			<td>PO custom field, the customer chooses which custom fields are available on all POs.</td>
  		</tr>
  		<tr>
  			<td>customField6</td>
  			<td>String</td>
  			<td>Optional</td>
  			<td>PO custom field, the customer chooses which custom fields are available on all POs.</td>
  		</tr>
  	</tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/po"
method: POST
body:
  type: json
  content: |-
    {
        "locationID": 38469,
        "vendorID": 182015,
        "userID": 230530,
        "requestDescription": "testing API created PO",
        "date": 1721631600,
        "expectedDate": 1721631600,
        "budgetID": 6913,
        "customField1": "Test customField1",
        "customField2": "Test customField2",
        "customField3": "Test customField3"
    }
examples: ./.resources/New Purchase Order.resources/examples
order: 5000
