      value: "112"
      disabled: true
      description: This parameter is a cursor that selects what vendorID you want to
        start receiving results at. e.g. passing 137 here will only get you
        vendors with an id greater than 137.
    - key: limit
      value: "100"
      disabled: true
      description: This parameter is a result limiter. The default is set to return no
        more than 100 results at one time.
