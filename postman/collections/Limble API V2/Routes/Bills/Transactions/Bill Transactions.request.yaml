$kind: http-request
description: This request gets information about the transactions made for a Bill.
url: "{{protocol}}://{{server}}:{{port}}/v2/bills/transactions?bills=423&items=\
  358&start=1630611650&end=1630611660&transactions=397&limit=10&locations=163"
method: GET
queryParams:
  - key: bills
    value: "423"
    description: This parameter is used to only get specific Bill Transactions by
      billID. This parameter expects a comma delimited list of billIDs.
  - key: items
    value: "358"
    description: This parameter is used to only get specific Bill Transactions by
      items in a Bill. This parameter expects a comma delimited list of poItem
      IDs.
  - key: start
    value: "1630611650"
    description: "This parameter is used to only get Bill Transactions that were
      created after or on the unix timestamp passed into it. "
  - key: end
    value: "1630611660"
    description: "This parameter is used to only get Bill transactions that were
      created before or on the unix timestamp passed into it. "
  - key: transactions
    value: "397"
    description: This parameter is used to only get specific Bill Transactions. This
      parameter expects a comma delimited list of transactionIDs.
  - key: limit
    value: "10"
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
  - key: locations
    value: "163"
    description: This parameter is used to only get Bill Transactions at a specific
      group of Locations. This parameter accepts a comma delimited list of
      Location IDs.
body:
  type: json
  content: ""
examples: ./.resources/Bill Transactions.resources/examples
order: 2000
