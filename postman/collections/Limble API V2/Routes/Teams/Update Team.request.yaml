$kind: http-request
description: |-
  Update a team name.

  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr>
  			<td>name</td>
  			<td>String</td>
  			<td>Required</td>
  			<td>The name of the team.</td>
  		</tr>
  	</tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/teams/:teamID"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  - key: teamID
    value: "{{teamID}}"
    description: The teamID of the team you are updating.
body:
  type: text
  content: |-
    {
    	"name": "{{updatedTeamName}}",
    	"locationID": {{locationID}}
    }
scripts:
  - type: afterResponse
    code: "pm.test(\"response is ok\", function () {\r

      \    pm.response.to.have.status(200);\r

      });"
    language: text/javascript
  - type: beforeRequest
    code: >
      const updatedTeamName = `updated_team_name_${Math.floor(Math.random() *
      10000000)}`;


      pm.globals.set('updatedTeamName', updatedTeamName);
    language: text/javascript
examples: ./.resources/Update Team.resources/examples
order: 3000
