$kind: http-request
description: This request deletes a Team. This will also remove the Team from
  any User it is assigned to.
url: "{{protocol}}://{{server}}:{{port}}/v2/teams/:teamID"
method: DELETE
pathVariables:
  - key: teamID
    value: "{{teamID}}"
    description: The teamID of the team you are deleting.
scripts:
  - type: afterResponse
    code: "pm.test(\"response is ok\", function () {\r

      \    pm.response.to.have.status(200);\r

      });"
    language: text/javascript
examples: ./.resources/Delete Team.resources/examples
order: 4000
