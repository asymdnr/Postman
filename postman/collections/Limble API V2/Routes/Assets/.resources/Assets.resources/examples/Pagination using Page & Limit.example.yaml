$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/assets/?limit=5&orderBy=-lastEdited\
    &page=3"
  method: GET
  queryParams:
    - key: assets
      value: "1"
      disabled: true
      description: This parameter is used to only get specific Assets. This parameter
        expects a comma delimited list of Asset IDs.
    - key: name
      value: test%
      disabled: true
      description: This is a parameter used to string search for a name or partial
        name of an asset this parameter expects a string with the wildcard %.
    - key: locations
      value: "73"
      disabled: true
      description: This parameter is used to only get Assets at a specific group of
        Locations. This parameter accepts a comma delimited list of Location
        IDs.
    - key: start
      value: "1541796014"
      disabled: true
      description: This parameter is used to only get Assets that were last edited
        after the unix timestamp passed into the start parameter. For example,
        all Assets that were last edited after April 18th, 2018.
    - key: end
      value: "1541796014"
      disabled: true
      description: This parameter is used to only get Assets that were last edited
        *before* the unix timestamp passed into the end parameter.
    - key: cursor
      value: "0"
      disabled: true
      description: This parameter is a cursor that selects what ID you want to start
        receiving results at. Without ordering, this will return results with an
        ID greater than the value of cursor. With ordering, this will return
        results starting at the next item in the order, regardless of whether
        its ID is greater than or lesser than the value of cursor.
    - key: limit
      value: "5"
      description: This parameter is a result limiter. The default is set to return no
        more than 100 results at one time.
    - key: parentAssetID
      value: "2317"
      disabled: true
      description: This parameter can be used to get asset(s) children using the
        Parent's ID. This parameter accepts a comma delimited list of Asset IDs.
    - key: orderBy
      value: -lastEdited
      description: This parameter is used to order results by their lastEdited
        property instead of the default ordering by ascending assetID. CANNOT be
        provided alongside the cursor parameter. to paginate in this ordering,
        use the start or end parameters.
    - key: page
      value: "3"
      description: This parameter is used to paginate results based on the limit.
        Refer to Pagination section for more information.
