$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/assets/:assetID/image"
  method: DELETE
  headers:
    Content-Type: application/x-www-form-urlencoded
  pathVariables:
    - key: assetID
      value: "{{assetID}}"
      description: assetID of the asset you are removing the main image from.
  body:
    type: formdata
    content:
      - type: file
        key: image
        src: []
        disabled: true
response:
  statusCode: 200
  statusText: OK
  headers:
    X-DNS-Prefetch-Control: off
    X-Frame-Options: SAMEORIGIN
    Strict-Transport-Security: max-age=15552000; includeSubDomains
    X-Download-Options: noopen
    X-Content-Type-Options: nosniff
    X-XSS-Protection: 1; mode=block
    API-Feedback-Link: https://portal.productboard.com/zodsn5nylisgwqkcbx9rh6kp/
    Date: Tue, 27 Aug 2019 21:43:15 GMT
    Connection: keep-alive
    Content-Length: "0"
  body:
    type: text
    content: ""
order: 1000
