$kind: http-request
description: This request removes the main image from the asset.
url: "{{protocol}}://{{server}}:{{port}}/v2/assets/:assetID/image"
method: DELETE
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: assetID
    value: "{{assetID}}"
    description: assetID of the asset you are removing the main image from.
scripts:
  - type: afterResponse
    code: |
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Delete Asset Main Image.resources/examples
order: 2000
