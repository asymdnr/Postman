$kind: http-request
description: >-
  This request creates a new blank Asset.


  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr>
  			<td>name</td>
  			<td>String</td>
  			<td>Required</td>
  			<td>The new name of the Asset.</td>
  		</tr>
  		<tr class="even">
  			<td>hoursPerWeek</td>
  			<td>Integer</td>
  			<td>Optional</td>
  			<td>The new hours of operation per week for this Asset. Use -1 to disable this feature.</td>
  		</tr>
  		<tr>
  			<td>parentAssetID</td>
  			<td>Int</td>
  			<td>Optional</td>
  			<td>The asset's parent. This makes it so assets can be nested in the web application</u></a>.</td>
  		</tr>
  		<tr>
  			<td>locationID</td>
  			<td>Int</td>
  			<td>Required</td>
  			<td>The ID of the location this asset is located at.</u></a></td>
  		</tr>
  <tr>
  			<td>geoLocation</td>
  			<td>geoJSON</td>
  			<td>Optional</td>
  			<td>The <a href="https://geojson.org">geoJSON</a> Feature object that can be used to locate an asset on a Map.</u></a></td>
  		</tr>
  	</tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/assets/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |
    {
    	"locationID": {{assetLocationID}},
    	"name": "{{assetName}}",
    	"hoursPerWeek": 100,
        "geoLocation": {
          "type": "Feature",
          "properties": {
            "name": "Lehi"
          },
          "geometry": {
            "type": "Point",
            "coordinates": [
              -111.84906005859375,
              40.39075031913329
            ]
          }
        }
    }
scripts:
  - type: beforeRequest
    code: pm.globals.set('assetName', `new asset - ${Math.floor(Math.random() *
      10000000)}`);
    language: text/javascript
  - type: afterResponse
    code: |
      const assetID = pm.response.json().assetID;

      pm.test("response is created", () => {
          pm.response.to.have.status(201);
      });

      pm.test("location header is valid", () => {
          const locationHeader = postman.getResponseHeader('Location')
          pm.expect(locationHeader).to.eql(`/v2/assets/?assets=${assetID}`);
      })

      pm.globals.set('assetID', assetID);
    language: text/javascript
examples: ./.resources/New Asset.resources/examples
order: 7000
