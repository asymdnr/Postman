$kind: http-request
description: This requests updates a manual log entry for an asset.
url: "{{protocol}}://{{server}}:{{port}}/v2/assets/logs/:logID"
method: PATCH
pathVariables:
  - key: logID
    value: "7257"
    description: The ID of the log to be updated.
body:
  type: json
  content: "{\r

    \    \"logEntry\": \"Changing log\"\r

    }"
examples: ./.resources/Update Asset Log.resources/examples
order: 4000
