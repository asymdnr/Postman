$kind: http-request
description: This requests deletes a manual log entry for an asset.
url: "{{protocol}}://{{server}}:{{port}}/v2/assets/logs/:logID"
method: DELETE
pathVariables:
  - key: logID
    value: "7257"
    description: The ID of the log to be deleted.
examples: ./.resources/Delete Asset Log.resources/examples
order: 5000
