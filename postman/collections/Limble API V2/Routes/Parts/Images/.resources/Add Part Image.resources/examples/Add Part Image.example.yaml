$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/parts/:partID/image"
  method: PUT
  pathVariables:
    partID: "{{partID}}"
  body:
    type: formdata
    content:
      - type: file
        key: image
        src: 4k-wallpaper-background-beautiful-853199.jpg
response:
  statusCode: 200
  statusText: OK
  headers:
    X-DNS-Prefetch-Control: off
    X-Frame-Options: SAMEORIGIN
    Strict-Transport-Security: max-age=15552000; includeSubDomains
    X-Download-Options: noopen
    X-Content-Type-Options: nosniff
    X-XSS-Protection: 1; mode=block
    API-Feedback-Link: https://portal.productboard.com/zodsn5nylisgwqkcbx9rh6kp/
    Date: Wed, 28 Aug 2019 04:16:40 GMT
    Connection: keep-alive
    Content-Length: "0"
  body:
    type: text
    content: ""
order: 1000
