$kind: http-request
description: This request adds the main image for a Part.
url: "{{protocol}}://{{server}}:{{port}}/v2/parts/:partID/image"
method: PUT
pathVariables:
  - key: partID
    value: "{{partID}}"
    description: partID of the part you are adding an image to.
body:
  type: formdata
  content:
    - type: file
      key: image
      src: /C:/Users/jeffbabb/Pictures/heic1509a.jpg
scripts:
  - type: afterResponse
    code: |-
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Add Part Image.resources/examples
order: 1000
