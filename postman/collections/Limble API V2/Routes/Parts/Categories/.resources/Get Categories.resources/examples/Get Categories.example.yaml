      value: "1"
      disabled: true
      description: This parameter is used to only get specific part categories. This
        parameter accepts a comma delimited list of categoryIDs.
    - key: name
      value: Electronics
      disabled: true
      description: This parameter is used to string search part categories names
        either partial or full name with the wildcard %.
