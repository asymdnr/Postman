$kind: http-request
description: |-
  This request updates a Part Category's name.

  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr class="even">
  			<td>name</td>
  			<td>string</td>
  			<td>Required</td>
  			<td>The name of your new part category (i.e. "Filters")</td>
  		</tr>
  	</tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/parts/categories/:categoryID"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  - key: categoryID
    value: "{{categoryID}}"
    description: categoryID of the category you wish to update.
body:
  type: text
  content: |-
    {
    	"name": "Filters"
    }
scripts:
  - type: beforeRequest
    code: pm.globals.set('newCategoryName', `new category name -
      ${Math.floor(Math.random() * 10000000)}`);
    language: text/javascript
  - type: afterResponse
    code: |
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Update Part Category.resources/examples
order: 3000
