$kind: http-request
description: >-
  This request updates a Part's field value.


  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr class="even">
  			<td>value</td>
  			<td>Depends on fieldType</td>
  			<td>Required</td>
  			<td>The value that will be written to the field. "value" must correspond to the fieldType of the field. For example, if the field is a "number" fieldType, then "value" must be a number.
  			</td>
  		</tr>
  	</tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/parts/fields/:valueID"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  valueID: "223"
body:
  type: text
  content: |-
    {
    	"value": "new value"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("response should be okay to process", function () { 
          pm.response.to.not.be.error; 
          pm.response.to.not.have.jsonBody("error"); 
      });
    language: text/javascript
  - type: beforeRequest
    code: >-
      var fieldValue = () => `part field value - ${Math.floor(Math.random() *
      10000000)}`;

      pm.globals.set('partFieldValue', fieldValue());
    language: text/javascript
examples: ./.resources/Update Part Field Value.resources/examples
order: 3000
