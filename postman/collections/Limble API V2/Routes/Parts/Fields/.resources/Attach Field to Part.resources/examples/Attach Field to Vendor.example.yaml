$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/vendors/:vendorID/fields"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: text/html
  pathVariables:
    vendorID: "1"
  body:
    type: text
    content: |-
      {
      	"fieldID": {{vendorFieldID}},
      	"locationID": {{locationID}}
      }
