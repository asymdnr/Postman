$kind: http-request
description: |-
  This request creates a new Vendor.

  <p><br><br></p><p><br><br><br></p><table><tbody><tr><th>Parameter</th><th>Type</th><th>Required?</th><th>Description</th></tr><tr><td><div>name</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>String</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Required</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The name of the Vendor.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>locationID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Required</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The locationID of the Location the Vendor will be at.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>email</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Vendor's email address.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>contact</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Vendor's primary contact.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>phone</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Vendor's phone number.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>address</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Vendor's address.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/vendors"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
    	"locationID": "163",
    	"name": "{{newVendorName}}",
    	"email": "{{newVendorEmail}}",
    	"phone": "15555555555",
    	"contact": "Bill Frost",
        "address": "123 Main St, Anytown, USA"
    }
scripts:
  - type: beforeRequest
    code: |
      const vendorName = `vendor_name_${Math.floor(Math.random() * 10000000)}`;

      pm.globals.set('newVendorName', vendorName);
      pm.globals.set('newVendorEmail', `${vendorName}@domain.com`);
    language: text/javascript
  - type: afterResponse
    code: |
      const vendorID = pm.response.json().vendorID;

      pm.test("response is created", () => {
          pm.response.to.have.status(201);
      });

      pm.test("location header is valid", () => {
          const locationHeader = postman.getResponseHeader('Location')
          pm.expect(locationHeader).to.eql(`/v2/vendors/?vendors=${vendorID}`);
      })

      pm.globals.set('vendorID', vendorID);
    language: text/javascript
examples: ./.resources/New Vendor.resources/examples
order: 5000
