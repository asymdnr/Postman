$kind: http-request
description: |-
  This request returns the manual log entries for a vendor.

  This request returns logs created manually by users on vendors. Logs related to tasks with vendors will not be returned.

  **Note:** this endpoint supports pagination. Please refer to the [**Pagination**](#pagination) section for more information.

  <p><b>Return data description</b></p>

  <table><tbody><tr><th>Property</th><th>Description</th></tr><tr><td>logID</td><td>The unique logID of the log.</td></tr><tr><td>dateCreated</td><td>The date the log was created as a UNIX timestamp.</td></tr><tr><td>vendorD</td><td>The ID of the vendor the log belongs to.</td></tr><tr><td>logEntry</td><td>The log entry for the vendor.</td></tr><tr><td>userID</td><td>The ID of the user that created the log.</td></tr><tr><td>logFiles</td><td>An array of objects that have a fileID, fileName and a link that can used to download the files attached to the log. All links are only valid for 15 minutes, a new call will generate a new link.</td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/vendors/:vendorID/logs"
method: GET
queryParams:
  - key: logs
    value: 2,3
    disabled: true
    description: This parameter is used to only get specific logs. This parameter
      accepts a comma delimited list of logIDs.
  - key: users
    value: "340"
    disabled: true
    description: This parameter is used to only get logs created by specific users.
      This parameter accepts a comma delimited list of userIDs.
  - key: logEntry
    value: "%test%"
    disabled: true
    description: This is a parameter used to string search for manual log entry.
      This parameter expects a string with the wildcard %.
  - key: start
    value: "1555085800"
    disabled: true
    description: "This parameter is used to only get logs that were last edited
      after the unix timestamp passed into the start parameter. "
  - key: end
    value: "1555087900"
    disabled: true
    description: This parameter is used to only get logs that were last edited
      before the unix timestamp passed into the end parameter.
  - key: page
    value: "1"
    disabled: true
    description: This parameter is used to paginate results based on the limit.
      Refer to Pagination section for more information.
  - key: limit
    value: "1"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
  - key: cursor
    value: ""
    disabled: true
    description: "This parameter is a cursor that selects what ID you want to start
      receiving results at. "
pathVariables:
  - key: vendorID
    value: "9"
    description: The ID of the vendor you need the logs for.
examples: ./.resources/Vendor Logs.resources/examples
order: 2000
