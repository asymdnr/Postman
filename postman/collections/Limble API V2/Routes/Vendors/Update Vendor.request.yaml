$kind: http-request
description: |-
  This Request updates a Vendor's name, phone, email, contact, address, etc.

  <table><tbody><tr><th>Parameter</th><th>Type</th><th>Required?</th><th>Description</th></tr><tr><td><div>name</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>String</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The name of the Vendor.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>locationID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Required</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The locationID of the Location the Vendor will be at.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>email</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Vendor's email address.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>contact</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Vendor's primary contact.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>address</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Vendor's address.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>phone</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Vendor's phone number.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/vendors/:vendorID"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  vendorID: "{{vendorID}}"
body:
  type: text
  content: |-
    {
    	"locationID": "163",
    	"name": "{{newVendorName}}",
    	"email": "{{newVendorEmail}}",
    	"phone": "15555555555",
    	"contact": "Bill Frost",
        "address": "123 North Ave"
    }
scripts:
  - type: beforeRequest
    code: |
      const vendorName = `vendor_name_${Math.floor(Math.random() * 10000000)}`;

      pm.globals.set('newVendorName', vendorName);
      pm.globals.set('newVendorEmail', `${vendorName}@domain.com`);
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"response should be okay to process\", function () { \r

      \    pm.response.to.not.be.error; \r

      \    pm.response.to.not.have.jsonBody(\"error\"); \r

      });"
    language: text/javascript
examples: ./.resources/Update Vendor.resources/examples
order: 6000
