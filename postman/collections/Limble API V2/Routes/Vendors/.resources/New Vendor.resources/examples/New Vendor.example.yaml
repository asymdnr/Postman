$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/vendors"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
      	"locationID": "163",
      	"name": "{{newVendorName}}",
      	"email": "{{newVendorEmail}}",
      	"phone": "15555555555",
      	"contact": "Bill Frost"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    X-DNS-Prefetch-Control: off
    X-Frame-Options: SAMEORIGIN
    Strict-Transport-Security: max-age=15552000; includeSubDomains
    X-Download-Options: noopen
    X-Content-Type-Options: nosniff
    X-XSS-Protection: 1; mode=block
    API-Feedback-Link: https://portal.productboard.com/zodsn5nylisgwqkcbx9rh6kp/
    Location: /v2/vendors/?vendors=10
    Content-Type: application/json; charset=utf-8
    Content-Length: "17"
    ETag: W/"11-9Tr2mm6VcjI+0tLdROsYZ7WW9qw"
    Date: Tue, 27 Aug 2019 17:20:19 GMT
    Connection: keep-alive
  body:
    type: json
    content: |-
      {
          "vendorID": "10"
      }
order: 1000
