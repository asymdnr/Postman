$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/gl"
  method: GET
  queryParams:
    - key: cursor
      value: "0"
      disabled: true
      description: This parameter is a cursor that selects what glID you want to start
        receiving results at. e.g. passing 137 here will only get you GLs with
        an ID greater than 137.
    - key: limit
      value: "100"
      disabled: true
      description: This parameter is a result limiter. The default is set to return no
        more than 100 results at one time.
    - key: name
      value: "%office%"
      disabled: true
      description: This is a parameter used to string search for a name or partial
        name of a GL. This parameter expects a string with the wildcard %.
    - key: abbr
      value: "%off%"
      disabled: true
      description: This is a parameter used to string search for an abbreviation or
        partial abbreviation of a GL. This parameter expects a string with the
        wildcard %.
    - key: locations
      value: 1,163,2
      disabled: true
      description: This parameter is used to only get GLs that are linked to a
        location. This parameter accepts a comma delimited list of location IDs.
    - key: gls
      value: 1,2,3
      disabled: true
      description: This parameter is used to only get specific GLs. This parameter
        accepts a comma delimited list of GL IDs.
    - key: assets
      value: 1,2,3
      disabled: true
      description: This parameter is used to only get GLs that are linked to an asset.
        This parameter accepts a comma delimited list of asset IDs.
response:
  statusCode: 200
  statusText: OK
  headers:
    X-DNS-Prefetch-Control: off
    X-Frame-Options: SAMEORIGIN
    Strict-Transport-Security: max-age=15552000; includeSubDomains
    X-Download-Options: noopen
    X-Content-Type-Options: nosniff
    X-XSS-Protection: 1; mode=block
    API-Feedback-Link: https://portal.productboard.com/zodsn5nylisgwqkcbx9rh6kp/
    Content-Type: application/json; charset=utf-8
    Content-Length: "94"
    ETag: W/"5e-/HV2Fvv5APCE6//1pc594DQSPCc"
    Date: Thu, 07 Jan 2021 17:49:30 GMT
    Connection: keep-alive
  body:
    type: json
    content: |-
      [
          {
              "glID": 1,
              "abbr": "OFF",
              "name": "Office",
              "locationID": 234,
              "description": "Test",
              "assetID": 123
          }
      ]
order: 1000
