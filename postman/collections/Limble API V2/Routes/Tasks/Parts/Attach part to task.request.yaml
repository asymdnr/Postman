$kind: http-request
description: This request associates a part to a task.
url: "{{protocol}}://{{server}}:{{port}}/v2/tasks/:taskID/parts"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  taskID: "{{taskID}}"
body:
  type: text
  content: |-
    {
    	"partID": {{partID}},
    	"quantity": 10
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Attach part to task.resources/examples
order: 3000
