$kind: http-request
description: |-
  This request will create an empty Task, assign to a User or Team, etc.

  <table><tbody><tr><th>Parameter</th><th>Type</th><th>Required?</th><th>Description</th></tr><tr><td><div>name</div></td><td><div>String</div></td><td><div>Required</div></td><td><div>The name of the Task.</div></td></tr><tr><td><div>locationID</div></td><td><div>Int</div></td><td><div>Required</div></td><td><div>The id of the Location this Task is assigned to. Must be the Location's unique ID number.</div></td></tr><tr><td><div>due</div></td><td><div>Int</div></td><td><div>Required</div></td><td><div>The time at which the Task is due. Must be a <a rel="noreferrer noopener nofollow" href="https://www.unixtimestamp.com" target="_blank">unix timestamp</a>.</div></td></tr><tr><td><div>type</div></td><td><div>Int</div></td><td><div>Required</div></td><td><div>The type of Task according to this legend:<br>1 = Preventative Maintanance (PM).<br>2 = Unplanned Work Order (WO);<br>4 = Planned Work Order (WO);<br>6 = Work Request (WR).<br>Task types not listed here are not currently supported.<br>If you would like another Task type to be supported, please contact us.<br>A taskType of 6 prevents the user from assigning a batchID.</div></td></tr><tr><td><div>description</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>A brief description about the Task.</div></td></tr><tr><td><div>assetID</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>The Asset that the Task will be attached to, if any. Must be the unique ID number of the Asset. Omitting this parameter or setting it to zero will not attach the Task to an asset.</div></td></tr><tr><td><div>assignment</div></td><td><div>Int</div></td><td><div>Optional. Required if 'assignmentType' is used.</div></td><td><div>The User or Team to which the Task will be assigned. Must be a User or Team that exists at the specified Location. Must be the unique ID number of the user or Team. If this parameter is set, the assignmentType parameter must also be set.</div></td></tr><tr><td><div>templateID</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>The taskID of the task you wish to utilize as a template when posting a new Task. Using this will duplicate all steps in the Template to the newly created task. Templates can be easily viewed and built in Limble's web application.</div></td></tr><tr><td><div>assignmentType</div></td><td><div>Enum</div></td><td><div>Optional. Required if 'assignment' is used.</div></td><td><div>Specifies whether this Task will be assigned to a 'user', 'team' or 'multi'. If this parameter is set, the assignment parameter must also be set.</div></td></tr><tr><td><div>priority</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>Specifies the priority of the Task. Must correspond to a 'priorityLevel' (See GET Priorities) configured in your Limble account.</div></td></tr><tr><td><div>estimatedTime</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>Updates the estimated time of the task. This is the time it takes to complete the task in minutes.</div></td></tr><tr><td><div>scheduledStart</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>The scheduled start date of the task. Must be a <a rel="noreferrer noopener nofollow" href="https://www.unixtimestamp.com" target="_blank">unix timestamp</a>. Must be 0 or greater.</div></td></tr><tr><td><div>scheduledEnd</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>The scheduled end date of the task. Must be a <a rel="noreferrer noopener nofollow" href="https://www.unixtimestamp.com" target="_blank">unix timestamp</a>. Must be 0 or greater. If both scheduledStart and scheduledEnd are provided, scheduledEnd must be greater than scheduledStart.</div></td></tr><tr><td><div>requestName</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Specifies the name of the Work Requestor.</div></td></tr><tr><td><div>requestEmail</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Specifies the email address of the Work Requestor.</div></td></tr><tr><td><div>requestPhone</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Specifies the phone number of the Work Requestor.</div></td></tr><tr><td><div>requestDescription</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Specifies the description of the problem submitted by the Work Requestor.</div></td></tr><tr><td><div>meta1</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Task meta data. This does not show in the web application, but can be used to track items between integrated systems.</div></td></tr><tr><td><div>meta2</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Task meta data. This does not show in the web application, but can be used to track items between integrated systems.</div></td></tr><tr><td><div>meta3</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Task meta data. This does not show in the web application, but can be used to track items between integrated systems.</div></td></tr><tr><td><div>geoLocation</div></td><td><div>geoJSON</div></td><td><div>Optional</div></td><td><div>The <a rel="noreferrer noopener nofollow" href="https://geojson.org" target="_blank">geoJSON</a> Feature object that can be used to locate a task on a Map.</div></td></tr><tr><td><div>multiUsers</div></td><td><div>array</div></td><td><div>Optional. Required if assignmentType = multi</div></td><td><div>Array list of users a task is being assigned to.</div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/tasks"
method: POST
headers:
  Content-Type: application/json
queryParams:
  - key: name
    value: '"Priority Test"'
    disabled: true
  - key: locationID
    value: "34190"
    disabled: true
  - key: due
    value: "1749680211"
    disabled: true
  - key: type
    value: "2"
    disabled: true
  - key: templateID
    value: "9"
    disabled: true
body:
  type: json
  content: |-
    {
        "name": "Priority Test",
        "locationID": 34190,
        "type": 2,
        "due": 1748656599,
        "priority": 3,
        "scheduledStart": 1748650000,
        "scheduledEnd": 1748660000
    }
scripts:
  - type: afterResponse
    code: |
      const taskID = pm.response.json().taskID;

      pm.test("response is created", () => {
          pm.response.to.have.status(201);
      });

      pm.test("location header is valid", () => {
          const locationHeader = postman.getResponseHeader('Location')
          pm.expect(locationHeader).to.eql(`/v2/tasks/?tasks=${taskID}`);
      })

      pm.globals.set('taskID', taskID);
    language: text/javascript
examples: ./.resources/New Task.resources/examples
order: 9000
