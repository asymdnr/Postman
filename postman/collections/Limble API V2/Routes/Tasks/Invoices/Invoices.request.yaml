$kind: http-request
description: This request gets all Invoices associated with Tasks.
url: "{{protocol}}://{{server}}:{{port}}/v2/tasks/invoices/"
method: GET
queryParams:
  - key: invoices
    value: "1"
    disabled: true
    description: This parameter is used to only get specific invoices or invoices.
      This parameter accepts a comma delimited list of invoice IDs.
  - key: tasks
    value: "8250"
    disabled: true
    description: This parameter is used to only get invoices on a task or tasks.
      This parameter accepts a comma delimited list of task IDs.
  - key: start
    value: "1459391400"
    disabled: true
    description: This parameter is used to only get invoices that were logged after
      the unix timestamp passed into the start parameter. For example, all
      Invoices that were last edited after April 18th, 2018.
  - key: end
    value: "1518826313"
    disabled: true
    description: This parameter is used to only get invoices that were logged
      *before* the unix timestamp passed into the end parameter.
  - key: cursor
    value: "0"
    disabled: true
    description: This parameter is a cursor that selects what invoiceID you want to
      start receiving results at. e.g. passing 137 here will only get you tasks
      with an id greater than 137.
  - key: limit
    value: "100"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
scripts:
  - type: afterResponse
    code: "pm.test(\"response must be valid and have a body\", function () {\r

      \     // assert that the status code is 200\r

      \     pm.response.to.be.ok; // info, success, redirection,
      clientError,  serverError, are other variants\r

      \     // assert that the response has a valid JSON body\r

      \     pm.response.to.be.withBody;\r

      \     pm.response.to.be.json; // this assertion also checks if a
      body  exists, so the above check is not needed\r

      });"
    language: text/javascript
examples: ./.resources/Invoices.resources/examples
order: 2000
