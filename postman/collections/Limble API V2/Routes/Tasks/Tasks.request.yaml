$kind: http-request
description: |-
  This request gets top level information about Tasks such as completed date, assignment, assetID, etc.

  **Note:** this endpoint supports pagination. Please refer to the [<b>Pagination</b>](#pagination) section for more information.

  <p><b>Return data description</b></p>

  <table><tbody><tr><th>Property</th><th>Description</th></tr><tr><td><div>meta</div></td><td><div>This property has shortcuts to get other information related to the Task such as the Task's invoices, labor parts usage and instructions.</div></td></tr><tr><td><div>name</div></td><td><div>The Task's name.</div></td></tr><tr><td><div>userID</div></td><td><div>The id of the user this Task is assigned to. A Task can not be assigned to both a Team and a User at the same time.</div></td></tr><tr><td><div>teamID</div></td><td><div>The id of the team this Task is assigned to. A Task can not be assigned to both a Team and a User at the same time.</div></td></tr><tr><td><div>locationID</div></td><td><div>The id of the Location in which this Task belongs to.</div></td></tr><tr><td><div>template</div></td><td><div>This field indicates if the task is a 'template' that spawns other tasks based on schedules or not.</div></td></tr><tr><td><div>createdDate</div></td><td><div>The date this Task was created. This is a unix timestamp.</div></td></tr><tr><td><div>startDate</div></td><td><div>By default this value is 0 as the startDate is usually the same as the createdDate. Sometimes a task is created such that it is scheduled to start in the future (i.e. after the createdDate). In such a case this value will be a unix timestamp indicating the actual start date of the Task.</div></td></tr><tr><td><div>scheduledStart</div></td><td><div>The scheduled start date of the Task. This is a unix timestamp. A value of null means no scheduled start date is set.</div></td></tr><tr><td><div>scheduledEnd</div></td><td><div>The scheduled end date of the Task. This is a unix timestamp. A value of null means no scheduled end date is set.</div></td></tr><tr><td><div>due</div></td><td><div>The date this Task is due. This is a unix timestamp.</div></td></tr><tr><td><div>dateCompleted</div></td><td><div>The date this Task was completed. This is a unix timestamp. A value of 0 means this Task is not completed.</div></td></tr><tr><td><div>lastEdited</div></td><td><div>The date this Task was last edited. This is a unix timestamp.</div></td></tr><tr><td><div>description</div></td><td><div>The decription of a task.</div></td></tr><tr><td><div>completedByUser</div></td><td><div>The id of the User that completed this Task.</div></td></tr><tr><td><div>lastEditedByUser</div></td><td><div>The id of the User that last edited the task.</div></td></tr><tr><td><div>assetID</div></td><td><div>The id of the Asset that this Task belongs to.</div></td></tr><tr><td><div>completedUserWage</div></td><td><div>The price per hour of the User's Wage at the point in time when the task was completed.</div></td></tr><tr><td><div>priority</div></td><td><div>The priority of the Task.</div></td></tr><tr><td><div>downtime</div></td><td><div>The amount of downtime in seconds caused by this Task.</div></td></tr><tr><td><div>estimatedTime</div></td><td><div>The estimated time of the task. This is the time it takes to complete the task in minutes.</div></td></tr><tr><td><div>completionNotes</div></td><td><div>Notes inputted by the user at the time of task completion.</div></td></tr><tr><td><div>requestorName</div></td><td><div>The name of the person that requested this Task.</div></td></tr><tr><td><div>requestorEmail</div></td><td><div>The email of the person that requested this Task.</div></td></tr><tr><td><div>requestorPhone</div></td><td><div>The phone number of the person that requested this Task.</div></td></tr><tr><td><div>requestTile</div></td><td><div>The title of the work request being submitted.</div></td></tr><tr><td><div>requestField1</div></td><td><div>Work request portal custom field 1.</div></td></tr><tr><td><div>requestField2</div></td><td><div>Work request portal custom field 2.</div></td></tr><tr><td><div>requestField3</div></td><td><div>Work request portal custom field 3.</div></td></tr><tr><td><div>requestDropdown1</div></td><td><div>Work request portal custom dropdown box 1.</div></td></tr><tr><td><div>requestDropdown2</div></td><td><div>Work request portal custom dropdown box 2.</div></td></tr><tr><td><div>requestDropdown3</div></td><td><div>Work request portal custom dropdown box 3.</div></td></tr><tr><td><div>requestorDescription</div></td><td><div>The description of the request submitted via the Work Request portal.</div></td></tr><tr><td><div>type</div></td><td><div>1 = Preventative Maintanance (PM);<br>2 = Unplanned Work Order (WO);<br>4 = Planned Work Order (WO);<br>5 = Cycle Count;<br>6 = Work Request (WR);<br>7 = Min Part Threshold;<br>8 = Materials Request;</div></td></tr><tr><td><div>status</div></td><td><div>1 - Complete<br>0 - Incomplete<br><b>Note: this property indicates a task status with respect to task completion. For the custom task status refer to statusID</b></div></td></tr><tr><td><div>statusID</div></td><td><div>The current custom status assigned to this task.<br><b>Note: this indicates the current status of a task. Use GET Statuses to find the value of each statusID.</b></div></td></tr><tr><td><div>poIDs</div></td><td><div>An array of Purchase Order IDs linked to this Task. Returns an empty array if no Purchase Orders are linked.</div></td></tr><tr><td><div>associatedTaskID <b>(deprecated)</b></div></td><td><div>Please refer to associatedTask meta property on GET Task Instruction for instruction type 14.</div></td></tr><tr><td><div>meta1</div></td><td><div>Task meta data. This does not show in the web application, but can be used to track items between integrated systems.</div></td></tr><tr><td><div>meta2</div></td><td><div>Task meta data. This does not show in the web application, but can be used to track items between integrated systems.</div></td></tr><tr><td><div>meta3</div></td><td><div>Task meta data. This does not show in the web application, but can be used to track items between integrated systems.</div></td></tr><tr><td><div>geoLocation</div></td><td><div>The location of a task on a Map.</div></td></tr><tr><td><div>customTags</div></td><td><div>An array of custom tags associated with the task.</div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/tasks/?tasks=9109&assets=1&location\
  s=73&type=6&name=%test%&start=1000000000&end=2500000000&cursor=0&limit=2&page\
  =2&completedStart=0&completedEnd=2500000000&scheduledStart=0&scheduledEnd=250\
  0000000&orderBy=-createdDate&geoLocation=true&users=11&teams=500&lastEditedBy\
  Users=0,340,341&status=1&meta1=1&meta2=2&meta3=3&statusIDs=0,1,2&tag=@My
  Custom Tag;"
method: GET
queryParams:
  - key: tasks
    value: "9109"
    description: This parameter is used to only get specific Tasks. This parameter
      accepts a comma delimited list of task IDs.
  - key: assets
    value: "1"
    description: This parameter is used to only get Tasks that are linked to an
      asset. This parameter accepts a comma delimited list of asset IDs.
  - key: locations
    value: "73"
    description: This parameter is used to only get Tasks at a specific group of
      Locations. This parameter accepts a comma delimited list of Location IDs.
  - key: type
    value: "6"
    description: This parameter is used to only get Tasks of a specific type. This
      parameter accepts a comma delimited list of task types.
  - key: name
    value: "%test%"
    description: This is a parameter used to string search for a name or partial
      name of a task this parameter expects a string with the wildcard %.
  - key: start
    value: "1000000000"
    description: This parameter is used to only get Tasks that were last edited
      after the unix timestamp passed into the start parameter. For example, all
      Tasks that were last edited after April 18th, 2018.
  - key: end
    value: "2500000000"
    description: This parameter is used to only get Tasks that were last edited
      before the unix timestamp passed into the end parameter.
  - key: cursor
    value: "0"
    description: This parameter is a cursor that selects what taskID you want to
      start receiving results at. e.g. passing 137 here will only get you tasks
      with an id greater than 137.
  - key: limit
    value: "2"
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
  - key: page
    value: "2"
    description: This parameter is used to paginate results based on the limit.
      Refer to Pagination section for more information.
  - key: completedStart
    value: "0"
    description: This parameter is used to only get Tasks that were completed after
      the unix timestamp passed into this parameter. For example, all Assets
      that were completed after April 18th, 2018.
  - key: completedEnd
    value: "2500000000"
    description: This parameter is used to only get Tasks that were completed before
      the unix timestamp passed into this parameter.
  - key: scheduledStart
    value: "0"
    description: This parameter is used as the start of a scheduled-date window.
      Tasks are returned when their scheduled date range overlaps this
      timestamp.
  - key: scheduledEnd
    value: "2500000000"
    description: This parameter is used as the end of a scheduled-date window. Tasks
      are returned when their scheduled date range overlaps this timestamp.
  - key: orderBy
    value: -createdDate
    description: This parameter sorts based on the value you pass. Negative
      parameters are used to reverse sort order. This supports sorting by due,
      createdDate, dateCompleted, scheduledStart, scheduledEnd, and lastEdited.
  - key: geoLocation
    value: "true"
    description: This parameter is used to filter results that contain a geoLocation
      property. By default it is false and will return all tasks with and
      without geoLocation property. If true, it will only return tasks with a
      geoLocation property.
  - key: users
    value: "11"
    description: This parameter filters tasks by assignee user IDs. It returns tasks
      directly assigned to those users and tasks assigned through team/profile
      membership (including multi-user assignments). This parameter accepts a
      comma delimited list of user IDs.
  - key: teams
    value: "500"
    description: This parameter is used to only get Tasks assigned to specific
      teams/profiles. This parameter accepts a comma delimited list of team IDs.
  - key: lastEditedByUsers
    value: 0,340,341
    description: This parameter is used to filter tasks by users who last edited the task.
  - key: status
    value: "1"
    description: This parameter is used to filter tasks by completed status. 1 -
      Complete  0 - Incomplete
  - key: meta1
    value: "1"
    description: This parameter is used to filter tasks by task meta data. This does
      not show in the web application, but can be used to track items between
      integrated systems.
  - key: meta2
    value: "2"
    description: This parameter is used to filter tasks by task meta data. This does
      not show in the web application, but can be used to track items between
      integrated systems.
  - key: meta3
    value: "3"
    description: This parameter is used to filter tasks by task meta data. This does
      not show in the web application, but can be used to track items between
      integrated systems.
  - key: statusIDs
    value: 0,1,2
    description: This parameter is used to filter tasks by their associated statusID.
  - key: tag
    value: "@My Custom Tag;"
    description: This parameter is used to filter results that contain a certain
      custom tag. The tag must match exactly, i.e. "Tag" would not match "My
      Custom Tag". Searching for "@My Custom Tag;" is equivalent to searching
      for "My Custom Tag" but because custom tags are stored with an at sign
      ("@") at the beginning and a semicolon (";") at the end it is recommended
      that the param follows the same format.
scripts:
  - type: afterResponse
    code: "pm.test(\"response must be valid and have a body\", function () {\r

      \     // assert that the status code is 200\r

      \     pm.response.to.be.ok; // info, success, redirection,
      clientError,  serverError, are other variants\r

      \     // assert that the response has a valid JSON body\r

      \     pm.response.to.be.withBody;\r

      \     pm.response.to.be.json; // this assertion also checks if a
      body  exists, so the above check is not needed\r

      });"
    language: text/javascript
examples: ./.resources/Tasks.resources/examples
order: 12000
