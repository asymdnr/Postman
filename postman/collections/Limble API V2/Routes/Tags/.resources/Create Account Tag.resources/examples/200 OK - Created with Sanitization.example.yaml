$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/tags"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "name": "@Food Safety"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "created": true,
        "name": "@Food Safety",
        "sanitizations": [
          "Commas are converted to spaces.",
          "Multiple @ characters collapsed to one."
        ],
        "tags": [
          "@Food Safety;",
          "@Safety;"
        ]
      }
order: 2000
