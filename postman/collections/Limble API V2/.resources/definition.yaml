  ## Securing Webhooks

  To ensure the authenticity and integrity of webhook events each webhook is  
  signed with a signature as well as some other data described below:

  <table><tbody><tr><th>Parameter</th><th>Type</th><th>Description</th></tr><tr><td><div>timestamp</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>int</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>A standard unix time stamp</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>token</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div><br>randomly generated string that is an integrity check of the<br>payload.<br></div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>signature</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>String</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>A string generated by the HMAC algorithm</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>

  To verify the webhook is originating from LimbleCMMS you will need to:

  - Concatenate the timestamp and token
      
  - Encode your private API key (oldest Limble API Key) with the SHA256 algorithm
      
  - Encode the timestamp and token value with the HMAC algorithm using your hashed private key and the SHA256 method.
      
  - Compare the resulting digest to the signature provided in your webhook  
      header
      

  ## Validation Code Examples

  Code samples to verify webhook data.

  <h3>PHP</h3>

  ```
  function verify($timestamp, $signature, $apiKey, $token)
      //hash private key
      $apiKey = hash('sha256', $apiKey);
      $generated_signature = hash_hmac('sha256', $timestamp . $token, $apiKey);
      if($generated_signature === $signature) {
          return true;
      } else {
          return false;
      }
  } 

   ```

  <h3>NodeJS</h3>

  ```
  var crypto  = require('crypto');
  const verify = (apiKey, token, timestamp, signature) => {
      //hash private key
      const apiKey = crypto.createHash('sha256').update(apiKey).digest('hex');
      const value = timestamp+token;
      const generated_signature = crypto.createHmac('sha256',apiKey).update(value).digest('hex');
      if(signature === generated_signature){
          return true;
      } else {
          return false;
      }
  };

   ```

