  # Rate limit

  To help protect against run-away scripts, clients who make an inordinate  
  number of calls over a period of time may be temporarily blocked from  
  accessing the service. The limits are defined in the table below. If you  
  receive an error indicating that you have exceeded the call limit, please  
  wait and try again later. If you need higher limits please reach out to your dedicated account manager.

  ## Per Hour

