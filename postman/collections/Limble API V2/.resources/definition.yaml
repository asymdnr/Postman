description: |-
  <h1>Getting Started!</h1>

  <p>Welcome to Limble CMMS’s API documentation.<br><br>You can use this documentation to configure connections to the Limble CMMS API over https using RESTful standards.</p>

  <p><br>Using the API you can get information about the following portions of your system:</p>

  <ul><li><div>Assets</div></li><li><div>Locations</div></li><li><div>Parts (Current quantities and Usage)</div></li><li><div>Tasks (Work Orders, Preventive Maintenance, Work Requests, etc.)</div></li><li><div>Users</div></li><li><div>Vendors</div></li><li><div>Roles</div></li><li><div>Teams</div></li><li><div>Purchase Orders</div></li><li><div>General Ledgers</div></li><li><div>Budgets</div></li><li><div>Priorities</div></li><li><div>Tags</div></li><li><div>Statuses</div></li><li><div>Bills</div></li><li><div>Regions</div></li><li><div>Webhooks</div></li><li><div>Units of Measure(UOM)</div></li></ul>

  Please use the correct Limble API URL to connect to our API based on the region or the type of your Limble Account.

  | **Limble Account (Region/Type)** | **Limble API URL** |
  | --- | --- |
  | Default | api.limblecmms.com |
  | Canada | ca-api.limblecmms.com |
  | Australia | au-api.limblecmms.com |
  | Europe | eu-api.limblecmms.com |
  | 21CFR | 21cfr-api.limblecmms.com |

  ---

  # Authentication

  <p><br>To protect your information the Limble CMMS API uses BASIC authorization standards.<br><br>Every call to the API must include an authorization header with your base 64 encoded id and secret.<br><br><b>Client ID</b><br><br>Your Client ID is your unique customer identification.<br><br><b>Client Secret</b><br><br>Your Client Secret is used to authenticate the Client ID on each API call. This is something that <b>must be kept secret</b>.<br></p>

  > How do I get my Client ID and Client Secret? 
    

  To obtain your Client ID and Client Secret login to your Limble account as a **Super Administrator** and go to **Settings** -> **Configuration**, on this page scroll down to the **API Settings** section and click **Generate API Keys**. Keep this information **secret**, you will only be able to see your Client Secret once upon initial generation. If you lose your secret you will need to regenerate it and update your integration accordingly.

  > Example Header  
  Authorization: Basic \[BASE64 ENCODED YOUR_CLIENT_ID:YOUR_CLIENT_SECRET 
    

  Below is a code example for PHP:

  ```
  $curl = curl_init();
  $id = 'your_client_id';
  $secret = 'your_client_id';
  $headers = array(
      'Content-Type:application/json',
      'Authorization: Basic '. base64_encode($id.':'.$secret)
  );
  curl_setopt($ch, CURLOPT_HTTPHEADER, $headers);
  curl_setopt_array($curl, array(
    CURLOPT_URL => 'https://api.limblecmms.com:443/v2/tasks/',
    CURLOPT_RETURNTRANSFER => true,
    CURLOPT_ENCODING => "",
    CURLOPT_MAXREDIRS => 10,
    CURLOPT_TIMEOUT => 0,
    CURLOPT_FOLLOWLOCATION => false,
    CURLOPT_HTTP_VERSION => CURL_HTTP_VERSION_1_1,
    CURLOPT_CUSTOMREQUEST => "GET",
  ));
  $response = curl_exec($curl);
  $err = curl_error($curl);
  curl_close($curl);
  if ($err) {
    echo "cURL Error #:" . $err;
  } else {
    echo $response;
  } ?>

   ```

  Below is a code example for NodeJS:

  ```
  const https = require('https');
  const id = 'your_client_id';
  const secret = 'your_client_secret';
  const options = {
    'method': 'GET',
    'hostname': 'api.limblecmms.com',
    'path': '/v2/tasks/?',
    'headers': {
      'Authorization': 'Basic ' + Buffer.from(`${credentials.id}:${credentials.secret}`).toString('base64')
    }
  };
  const req = https.request(options, function (res) {
    const chunks = [];
    res.on("data", function (chunk) {
      chunks.push(chunk);
    });
    res.on("end", function (chunk) {
      const body = Buffer.concat(chunks);
      console.log(body.toString());
    });
    res.on("error", function (error) {
      console.error(error);
    });
  });
  req.end();

   ```

  ---

  # Error Codes

  - HTTP 400 - Data Validation Error - Malformed JSON input or incorrect data type.
      
  - HTTP 403 - Forbidden - The resource cannot be accessed.
      
  - HTTP 404 - Resource not found - The resource you are targeting does not exist.
      
  - HTTP 409 - Resource Conflict - A resource already exists with those parameters.
      
  - HTTP 422 - Unprocessable Entity - The syntax of the request is correct but cannot be processed due to semantic errors.
      
  - HTTP 429 - Too Many Requests - See the rate limiting section below.
      
  - HTTP 500 - Internal Server Error - Contact Limble for assistance.
      
  - HTTP 501 - Method Not Support - Limble's API only supports GET, POST, PATCH, PUT, and DELETE.
      

  ---

  # Success Codes

  - HTTP 200 - OK - Everything was successful. PUTs, PATCHs and DELETEs on success always return an empty 200 OK.
      
  - HTTP 201 - CREATED - This is used on POST calls when new resouces are created. If a new resource was created Limble will always pass back a GET URL in the location header so a developer can easily GET the new resource.
      

  ---

  # Overriding HTTP methods

  Some systems may support only the `POST` and `GET` HTTP methods. This restriction prevents using other HTTP methods such as `PUT`, `PATCH` and `DELETE`. RESTful web API implementations can work around this restriction by letting the client override the HTTP method via the custom HTTP headers.

  The Limble API supports **Method Overrides** by using a `POST` request and setting the `X-HTTP-Method-Override` header with a method string value. The header value can be `PATCH` or `PUT`. This will allow Limble API users to use `PATCH` and `PUT` endpoints by sending `POST` requests to these endpoints and overriding them with the respective HTTP method.

  # Webhooks

  Receive data on certain events such as Tasks being completed.

  Limble's webhooks allow you to receive data whenever specific events occur.

  For example, you may need to run your own script whenever a Task is completed.

  Limble supports adding multiple webhooks that can be triggered when actions are carried out on:

  - Tasks
      
  - Assets
      
  - Asset Fields
      
  - Purchase Orders
      
  - Purchase Order Items
      

  When an event occurs, Limble sends an HTTP POST request to a URL endpoint you configure.

  You can configure this URL in the Limble Web App under:

  **Settings → Configuration → API Settings**

  All data sent is JSON-encoded, and Limble includes the following fields in the request headers for validation:

  - `signature`
      
  - `timestamp`
      
  - `token`
      

  You may register multiple webhooks for the same event type.

  ### Important: API Key Requirement for Webhooks

  To receive webhooks, the customer must have at least one active **limbleAPI key** created in API Settings.

  - Webhooks **will not function** without at least one valid `limbleAPI` key.
      
  - Limble uses the **first-created** **`limbleAPI`** **key** (by creation date) to generate the **signature** included in webhook headers.
      
  - The receiving system must use this key to verify the authenticity of incoming webhook requests.
      

  If a customer has multiple `limbleAPI` keys, **only the oldest one** will be used for signing webhook requests.

  ### Response Time and Retry Behavior

  Your server must respond to webhook POST requests within **10 seconds**.

  If it does not, Limble will attempt to retry the webhook request.

  Limble handles server responses as follows:

  - If the server returns **200 OK**, Limble considers the webhook successful and will not retry.
      
  - If the server returns **406 Not Acceptable**, Limble considers the webhook received but intentionally ignored — no retry will occur.
      
  - For any other response (e.g., 500, timeout, etc.), Limble will retry the request.
      

  **Retry schedule:**

  - After 10 minutes
      
  - After 1 hour
      
  - After 2 hours
      
  - After 4 hours
      

  After the final retry attempt, the webhook will be **automatically disabled**.

  ### Re-enabling a Disabled Webhook

  To re-enable a disabled webhook:

  1. Go to **Settings → Configuration → API Settings** in the Limble Web App.  
      Find the webhook and use the option to **Re-enable** the API endpoint.
      
  2. Alternatively, send a `PATCH` request using the **Update Webhook** endpoint and set `enabled = true`.
      

  ### Assets

  Below is an example payload you might be sent when an event occurs on an asset:

  ```
  {
     "assetID": 10748, 
     "status": "CREATED",
     "category": "asset", 
     "user": "bob@limblecmms.com" 
  }

   ```

  Once the Payload is received you can use the Get Assets API call to get the most recent Asset data. The following is a list of all the possible statuses that a webhook might be set to:

  <table><tbody><tr><th>Status</th><th>Description</th></tr><tr><td><div>CREATED</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>An Asset is created</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>DELETED</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>An Asset was deleted</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>CHANGED ASSET NAME</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>An asset has been renamed</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>

