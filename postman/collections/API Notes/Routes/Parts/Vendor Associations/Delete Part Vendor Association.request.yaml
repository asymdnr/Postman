$kind: http-request
description: >-
  Deletes a vendor-part association by its `relationID`. Only manually created
  associations (associationType: `manual`) can be deleted through this endpoint.


  Returns `204 No Content` on success. Returns `404 Not Found` if the
  association does not exist or does not belong to your account.
url: "{{protocol}}://{{server}}:{{port}}/v2/parts/vendors/associations/:relationID"
method: DELETE
headers:
  Content-Type: application/json
pathVariables:
  relationID: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test("response is no content", () => {
          pm.response.to.have.status(204);
      });
    language: text/javascript
examples: ./.resources/Delete Part Vendor Association.resources/examples
order: 2000
