$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/assets/fields/?page=1"
  method: GET
  queryParams:
    - key: assets
      value: "1022"
      disabled: true
      description: This parameter can be used to get a single Asset or a list of
        Assets in a comma-separated list.
    - key: name
      value: Model
      disabled: true
      description: This parameter is used to only get specific field by name. This
        parameter expects a string full name of a field or partial name with the
        wildcard %.
    - key: fields
      value: "302"
      disabled: true
      description: This parameter can be used to get a single Asset Fields or a list
        of Asset Fields in a comma-separated list.
    - key: start
      value: "1555105636"
      disabled: true
      description: This parameter is used to only get Asset Fields for Assets that
        were last edited after the unix timestamp passed into the start
        parameter. For example, all Assets that were last edited after April
        18th, 2018.
    - key: end
      value: "1555105636"
      disabled: true
      description: This parameter is used to only get Asset Fields for Assets that
        were last edited *before* the unix timestamp passed into the end
        parameter.
    - key: cursor
      value: "0"
      disabled: true
      description: This parameter is a cursor that selects what id you want to start
        receiving results at. e.g. passing 137 here will only get you asset
        fields with an id greater than 137.
    - key: limit
      value: "100"
      disabled: true
      description: This parameter is a result limiter. The default is set to return no
        more than 100 results at one time.
    - key: locations
      value: "163"
      disabled: true
      description: This parameter can be used to get a group of asset fields in a
        location in a comma-separated list.
    - key: value
      value: F250
      disabled: true
      description: This parameter is used to only get specific field by value. This
        parameter expects a string full name of a field or partial name with the
        wildcard %.
    - key: assetName
      value: "%fork%"
      disabled: true
      description: This parameter is used to only get specific fields by asset name.
        This parameter expects a string full name of a field or partial name
        with the wildcard %.
    - key: page
      value: "1"
      description: This parameter is used to paginate results based on the limit.
        Refer to Pagination section for more information.
