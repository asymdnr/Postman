$kind: http-request
description: >-
  This request updates the value of a Field that is attached to an Asset.  


  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr class="even">
  			<td>value</td>
  			<td>Varies depending on the Field's type</td>
  			<td>Required</td>
  			<td>The value that will be written to the field, overwriting the previous value and creating an entry in the field history.  "value" must correspond to the fieldType of the field. For example, if the field is a "number" fieldType, then "value" must be a number.
  			</td>
  		</tr>
  	</tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/assets/fields/:valueID/"
method: PATCH
headers:
  Content-Type: application/json
queryParams:
  - key: ""
    value: ""
    disabled: true
pathVariables:
  valueID: "1420"
body:
  type: text
  content: |-
    {
    	"value": "test"
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });
    language: text/javascript
  - type: beforeRequest
    code: pm.globals.set('updatedAssetFieldValue', Math.floor(Math.random() *
      10000000));
    language: text/javascript
examples: ./.resources/Update Asset Field Value.resources/examples
order: 5000
