$kind: http-request
description: >-
  This request attaches a Suggested Field to an Asset. The field and asset must
  belong to the same location.


  For example, let's say I have an Asset called Truck - 001.  This Truck doesn't
  have any Fields attached to it, but I want to track its Make so I can set that
  this Truck is a Dodge.  This is the request I would use to attach the Make
  Field to the Truck and then I would use the Update Asset Field Value request
  to set it to Dodge.



  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr>
  			<td>locationID</td>
  			<td>Int</td>
  			<td>Required</td>
  			<td>The ID of the Location the Asset exists at.</td>
  		</tr>
  		<tr>
  			<td>fieldID</td>
  			<td>Int</td>
  			<td>Required</td>
  			<td>The ID of the existing Field to add to the Asset.</td>
  		</tr>
  	</tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/assets/:assetID/fields"
method: PUT
headers:
  Content-Type: application/json
  Accept: text/html
pathVariables:
  assetID: "{{assetID}}"
body:
  type: text
  content: |-
    {
    	"locationID": {{locationID}},
    	"fieldID": {{assetFieldID}}
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });

      pm.globals.set('fieldValueID', pm.response.json().valueID);
    language: text/javascript
examples: ./.resources/Attach Field to Asset.resources/examples
order: 6000
