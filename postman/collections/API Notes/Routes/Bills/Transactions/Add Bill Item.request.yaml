$kind: http-request
description: >-
  This request creates a Bill transaction by adding a Bill Item to an unclosed
  Bill.


  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
      			<tr>
  			<td>poItemID</td>
  			<td>Int</td>
  			<td>Required</td>
  			<td>The ID of the item that has to be added to the Bill.</td>
  		</tr>
  		<tr>
  			<td>qtyReceived</td>
  			<td>Int</td>
  			<td>Required</td>
  			<td>The item quantity received on this Bill.</td>
  		</tr>
  	</tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/bills/:billID/transactions/"
method: POST
pathVariables:
  - key: billID
    value: "425"
    description: The ID of the bill for which an item needs to be added.
body:
  type: json
  content: "{\r

    \    \"poItemID\":358,\r

    \    \"qtyReceived\": 2\r

    }"
examples: ./.resources/Add Bill Item.resources/examples
order: 1000
