$kind: http-request
description: |-
  This request gets the labor categories.

  <p><b>Return data description</b></p>
  <table>
      <thead>
          <tr>
              <th>Property</th>
              <th>Description</th>
          </tr>
      </thead>
      <tbody>
          <tr>
              <td>categoryID</td>
              <td>The unique ID for this billing category.</td>
          </tr>
          <tr>
              <td>categoryName</td>
              <td>The name of this billing category.</td>
          </tr>
          <tr>
              <td>categoryRate</td>
              <td>The rate per hour of this billing category.</td>
          </tr>
      </tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/tasks/labor/categories"
method: GET
queryParams:
  - key: name
    value: "%tech%"
    disabled: true
    description: This is a parameter used to string search for a name or partial
      name of a category this parameter expects a string with the wildcard %.
  - key: limit
    value: "100"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
  - key: cursor
    value: "0"
    disabled: true
    description: This parameter is a cursor that selects what taskID you want to
      start receiving results at. e.g. passing 137 here will only get you tasks
      with an id greater than 137.
scripts:
  - type: afterResponse
    code: "pm.test(\"response must be valid and have a body\", function () {\r

      \     // assert that the status code is 200\r

      \     pm.response.to.be.ok; // info, success, redirection,
      clientError,  serverError, are other variants\r

      \     // assert that the response has a valid JSON body\r

      \     pm.response.to.be.withBody;\r

      \     pm.response.to.be.json; // this assertion also checks if a
      body  exists, so the above check is not needed\r

      });"
    language: text/javascript
examples: ./.resources/Get Labor Categories.resources/examples
order: 2000
