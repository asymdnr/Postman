$kind: http-request
description: |-
  This request adds instructional images to an Instruction.

  <p><b>Return data description</b></p><table><tbody><tr><th>Property</th><th>Description</th></tr><tr><td>filename</td><td>The name of the file after being uploaded to Limble.</td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/tasks/instructions/:instructionID/image"
method: PUT
pathVariables:
  instructionID: "59271"
body:
  type: formdata
  content:
    - type: file
      key: image
      src: pic.png
scripts:
  - type: afterResponse
    code: |-
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Task Instruction Image.resources/examples
order: 1000
