$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/users/capacity/exceptions/:userID?l\
    ocations=1&startDate=2026-01-01&endDate=2026-01-31&cursor=0&limit=100"
  method: GET
  queryParams:
    - key: locations
      value: "1"
      description: Required comma-separated location IDs used to scope the user access
        context.
    - key: startDate
      value: 2026-01-01
      description: Optional lower date bound (YYYY-MM-DD) for overlap filtering.
    - key: endDate
      value: 2026-01-31
      description: Optional upper date bound (YYYY-MM-DD) for overlap filtering. Must
        be >= startDate when both are present.
    - key: cursor
      value: "0"
      description: Optional ID cursor for keyset pagination.
    - key: limit
      value: "100"
      description: Optional max rows per page.
  pathVariables:
    userID: ""
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      [
        {
          "exceptionID": 1201,
          "userID": 42,
          "createdByUserID": 1,
          "exceptionStartDate": "2026-01-10",
          "exceptionEndDate": "2026-01-20",
          "capacityMinutes": 300,
          "hoursPerDay": 5,
          "minutesPerDay": 0,
          "exceptionTitle": "Training Week",
          "exceptionNotes": "Limited availability"
        }
      ]
order: 1000
