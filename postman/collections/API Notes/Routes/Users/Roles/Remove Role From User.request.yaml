$kind: http-request
description: This request removes a Role from a User.
url: "{{protocol}}://{{server}}:{{port}}/v2/users/:userID/roles"
method: DELETE
headers:
  Content-Type: application/json
pathVariables:
  - key: userID
    value: "{{userID}}"
    description: userID of the role user you are removing the Role from.
body:
  type: text
  content: "    {\r

    \        \"roleID\": {{roleID}},\r

    \        \"locationID\": {{locationID}}\r

    \    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"response should be okay to process\", function () { \r

      \    pm.response.to.not.be.error; \r

      \    pm.response.to.not.have.jsonBody(\"error\"); \r

      })"
    language: text/javascript
examples: ./.resources/Remove Role From User.resources/examples
order: 3000
