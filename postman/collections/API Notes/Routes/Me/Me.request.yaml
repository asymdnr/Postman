$kind: http-request
description: |-
  Identifies the current customer. This route can be used to test that authentication to the Limble API was successful.

  <p><b>Return data description</b></p>

  <table><tbody><tr><th>Property</th><th>Description</th></tr><tr><td><div>customerName</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The name of the customer that your API keys are valid for.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>customerPlan</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Limble plan the customer is currently subscribed to. The customerPlan can have one of following values:<br><br>starter<br>professional<br>business<br>enterprise<br>legacy - The plan the customer is currently subscribed to has been deprecated.<br><br>For more information about various plans please visit the <a rel="noreferrer noopener nofollow" href="https://limblecmms.com/pricing/" target="_blank" url="https://limblecmms.com/pricing/">Limble</a> website.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
