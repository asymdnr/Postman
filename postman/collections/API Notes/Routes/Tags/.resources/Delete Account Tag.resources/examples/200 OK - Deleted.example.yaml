$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/tags/:tagName"
  method: DELETE
  pathVariables:
    - key: tagName
      value: "@Food Safety"
      description: Tag name to delete (URL encode spaces and special characters)
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: text
    content: |-
      {
        "deleted": true,
        "name": "@Food Safety",
        "tags": [
          "@Quality;",
          "@Safety;"
        ]
      }
order: 1000
