$kind: http-request
description: >-
  Creates a new custom status for the customer account.


  **Request Body:**


  - `name` (string, required) - Status name, 1-100 characters, must be unique
  (case-insensitive)
      
  - `description` (string, optional) - Status description, max 65535 characters
      
  - `sortOrder` (integer, optional) - Display order, 0-99, auto-assigned if
  omitted
      

  **Response (201 Created):**


  - `statusID` (number) - ID of the newly created status
      
  - Location header: `/v2/statuses?statuses={statusID}`
      

  **Validation:**


  - Name must not conflict with existing statuses or defaults ("Open", "In
  Progress", "Complete")
      
  - Name is compared case-insensitively
url: "{{protocol}}://{{server}}:{{port}}/v2/statuses"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Blocked",
      "description": "Task is blocked by external dependencies",
      "sortOrder": 3
    }
examples: ./.resources/Create Status.resources/examples
order: 2000
