$kind: http-request
description: |-
  Deletes a file from a PO comment.

  Parameters:

  | Parameter | In | Type | Required | Default | Description |
  |---|---|---|---|---|---|
  | poID | path | integer | yes |  | Purchase Order identifier |
  | commentID | path | integer | yes |  | Comment identifier |
  | filename | query | string | yes |  | Exact filename to remove |

  Responses:
  - 200 OK: Deleted.
  - 404 Not Found: File not found.
url: "{{protocol}}://{{server}}:{{port}}/v2/po/:poID/comments/:commentID/file?f\
  ilename=invoice.pdf"
method: DELETE
queryParams:
  filename: invoice.pdf
pathVariables:
  poID: "1234"
  commentID: "5678"
examples: ./.resources/Delete PO Comment File.resources/examples
order: 3000
