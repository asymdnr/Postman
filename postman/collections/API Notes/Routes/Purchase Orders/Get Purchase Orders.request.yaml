  contenteditable=\"false\"><div><div><div></div></div></div><div></div></div><\
  /td><td><div>Last time this PO was edited as a UNIX timestamp.</div><div
  contenteditable=\"false\"><div><div><div></div></div></div><div></div></div><\
  /td></tr><tr><td><div>status</div><div
  contenteditable=\"false\"><div><div><div></div></div></div><div></div></div><\
  /td><td><div>This is the current status of a PO. Status of PO can be as
  follows:<br>0: the PO has only been setup. (Status: Setup)<br>1-97: these are
  custom statuses based on the budget steps. Refer to \"budgetSteps\" in meta.
  (Status : {Name of the budgetStep it is on} )<br>97: the PO is in the ready to
  receive step. This means items can be received for this PO. (Status: Ready to
  Receive)<br>98 all budget steps have been completed, but not all items on the
  PO have been received. This means only some items or partial qty of items have
  been received. (Status: Partially Received)<br>99: the PO is completed. This
  means all the items and their full qty on the PO have been received but not
  been paid for ( i.e. all the bills generated for this PO have not been marked
  as paid yet.) (Status: Fully Received - Pending Payment)<br>100: the PO is
  closed. This means all the items on the PO have been received and have been
  paid for. (i.e. all the bills for this PO have been marked as paid.) (Status:
  Closed)</div><div
  contenteditable=\"false\"><div><div><div></div></div></div><div></div></div><\
  /td></tr><tr><td><div>stateDetails</div><div
  contenteditable=\"false\"><div><div><div></div></div></div><div></div></div><\
  /td><td><div>JSON object containing details about the PO's current state, and
