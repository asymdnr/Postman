$kind: http-request
description: |-
  This request creates a new Team.

  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr>
  			<td>name</td>
  			<td>String</td>
  			<td>Required</td>
  			<td>The name of the Team.</td>
  		</tr>
  		<tr class="even">
  			<td>locationID</td>
  			<td>string</td>
  			<td>Required</td>
  			<td>The locationID of the Location the Team will be available at.</td>
  		</tr>
  	</tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/teams/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
    	"name": "{{teamName}}",
    	"locationID": 163
    }
scripts:
  - type: afterResponse
    code: |
      const teamID = pm.response.json().teamID;

      pm.test("response is created", () => {
          pm.response.to.have.status(201);
      });

      pm.test("location header is valid", () => {
          const locationHeader = postman.getResponseHeader('Location')
          pm.expect(locationHeader).to.eql(`/v2/teams/?teams=${teamID}`);
      });

      pm.globals.set('teamID', teamID);
    language: text/javascript
  - type: beforeRequest
    code: |+
      const teamName = `team_name_${Math.floor(Math.random() * 10000000)}`;

      pm.globals.set('teamName', teamName);

    language: text/javascript
examples: ./.resources/Create Team.resources/examples
order: 2000
