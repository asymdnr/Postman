$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/teams/?teams=1778,
    1771&name=%Lawn%&limit=100&cursor=0&automaticallyCreated=false"
  method: GET
  queryParams:
    - key: teams
      value: 1778, 1771
      description: This parameter expects a comma-separated list of teamIDs to filter
        teams by.
    - key: name
      value: "%Lawn%"
      description: This parameter is used to only get specific teams by name. This
        parameter expects a string full name of a team or partial name with the
        wildcard %.
    - key: limit
      value: "100"
      description: This parameter is a result limiter. The default is set to return no
        more than 100 results at one time.
    - key: cursor
      value: "0"
      description: This parameter is a cursor that selects what teamID you want to
        start receiving results at. e.g. passing 137 here will only get you
        tasks with an id greater than 137.
    - key: automaticallyCreated
      value: "false"
      description: This parameter is used to only get specific teams by if they were
        automatically created by Limble or not. This parameter expects a bool
        true or false.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Security-Policy: "default-src 'self';base-uri
      'self';block-all-mixed-content;font-src 'self' https:
      data:;frame-ancestors 'self';img-src 'self' data:;object-src
      'none';script-src 'self';script-src-attr 'none';style-src 'self' https:
      'unsafe-inline';upgrade-insecure-requests"
    X-DNS-Prefetch-Control: off
    Expect-CT: max-age=0
    X-Frame-Options: SAMEORIGIN
    Strict-Transport-Security: max-age=15552000; includeSubDomains
    X-Download-Options: noopen
    X-Content-Type-Options: nosniff
    X-Permitted-Cross-Domain-Policies: none
    Referrer-Policy: no-referrer
    X-XSS-Protection: "0"
    API-Feedback-Link: https://portal.productboard.com/zodsn5nylisgwqkcbx9rh6kp/
    Content-Type: application/json; charset=utf-8
    Content-Length: "9066"
    ETag: W/"236a-3jAhb2uRV743bGZBSJfCoITDGoc"
    Date: Thu, 31 Mar 2022 21:46:38 GMT
