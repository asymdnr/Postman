$kind: http-request
description: This request updates a manual log entry for a vendor.
url: "{{protocol}}://{{server}}:{{port}}/v2/vendors/logs/:logID"
method: PATCH
pathVariables:
  - key: logID
    value: "10"
    description: The ID of the log to be updated.
body:
  type: json
  content: "{\r

    \    \"logEntry\": \"Changing log\"\r

    }"
examples: ./.resources/Update Vendor Log.resources/examples
order: 4000
