$kind: http-request
description: |-
  This requests updates a Webhook.

  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr>
  			<td>endpoint</td>
  			<td>URL</td>
  			<td>Optional</td>
  			<td>The webhook URL.</td>
  		</tr>
  		<tr>
  			<td>type</td>
  			<td>String</td>
  			<td>Optional</td>
  			<td>The type of webhook. Refer to GET webhooks for type values</td>
  		</tr>
  		<tr>
  			<td>enabled</td>
  			<td>Int</td>
  			<td>Optional</td>
  			<td>Enable (1) or disable a webhook(0)</td>
  		</tr>
  	</tbody>
url: "{{protocol}}://{{server}}:{{port}}/v2/webhooks/:webhookID"
method: PATCH
pathVariables:
  - key: webhookID
    value: "42"
    description: This parameter expects a webhookID.
body:
  type: json
  content: "{\r

    \    \"endpoint\": \"https://hello123wf\",\r

    \    \"type\": \"task\",\r

    \    \"enabled\": 0\r

    }"
examples: ./.resources/Update Webhook.resources/examples
order: 4000
