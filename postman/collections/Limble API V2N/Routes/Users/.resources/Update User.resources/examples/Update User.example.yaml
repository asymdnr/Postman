$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/users/:userID"
  method: PATCH
  headers:
    Content-Type: application/json
  pathVariables:
    - key: userID
      value: "341"
      description: userID of the user you are updating.
  body:
    type: text
    content: |-
      {
      	"firstName": "Bryan",
      	"lastName": "Christiansen",
      	"email": "bryan@limblecmms.com",
      	"phone": "8015555555",
      	"wage": 16,
      	"workDayHours": 8,
      	"active": true,
      	"emailNotificationActive": false,
      	"pushNotificationActive": false
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    X-DNS-Prefetch-Control: off
    X-Frame-Options: SAMEORIGIN
    Strict-Transport-Security: max-age=15552000; includeSubDomains
    X-Download-Options: noopen
    X-Content-Type-Options: nosniff
    X-XSS-Protection: 1; mode=block
    API-Feedback-Link: https://portal.productboard.com/zodsn5nylisgwqkcbx9rh6kp/
    Date: Tue, 27 Aug 2019 21:58:27 GMT
    Connection: keep-alive
    Content-Length: "0"
  body:
    type: text
    content: ""
order: 1000
