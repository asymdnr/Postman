$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/users/capacity/exceptions?locations\
    =1,3&users=42,57&startDate=2026-01-01&endDate=2026-01-31&cursor=0&limit=100"
  method: GET
  queryParams:
    - key: locations
      value: 1,3
      description: Required comma-separated location IDs.
    - key: users
      value: 42,57
      description: Optional comma-separated user IDs filter.
    - key: startDate
      value: 2026-01-01
      description: Optional lower date bound (YYYY-MM-DD) for overlap filtering.
    - key: endDate
      value: 2026-01-31
      description: Optional upper date bound (YYYY-MM-DD) for overlap filtering. Must
        be >= startDate when both are present.
    - key: cursor
      value: "0"
      description: Optional ID cursor for keyset pagination.
    - key: limit
      value: "100"
      description: Optional max rows per page.
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      [
        {
          "exceptionID": 1201,
          "userID": 42,
          "createdByUserID": 1,
          "exceptionStartDate": "2026-01-10",
          "exceptionEndDate": "2026-01-20",
          "capacityMinutes": 300,
          "hoursPerDay": 5,
          "minutesPerDay": 0,
          "exceptionTitle": "Training Week",
          "exceptionNotes": "Limited availability"
        },
        {
          "exceptionID": 1202,
          "userID": 57,
          "createdByUserID": 1,
          "exceptionStartDate": "2026-01-15",
          "exceptionEndDate": null,
          "capacityMinutes": 120,
          "hoursPerDay": 2,
          "minutesPerDay": 0,
          "exceptionTitle": "Half Day",
          "exceptionNotes": "On-site meeting"
        }
      ]
order: 1000
