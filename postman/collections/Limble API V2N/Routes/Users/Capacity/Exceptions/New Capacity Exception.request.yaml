$kind: http-request
description: >-
  Creates a capacity exception for a user.


  `capacityMinutes` means the user's available work capacity **per day** for
  each day in the exception date/range. It is **not** the total duration of the
  exception range.


  Examples:


  - `capacityMinutes: 0` => unavailable that day (or each day in the range).
      
  - `capacityMinutes: 480` => 8 hours available per day.
      

  You can provide either:


  - `capacityMinutes` directly, or
      
  - `hoursPerDay` + `minutesPerDay` (equivalent input).
url: "{{protocol}}://{{server}}:{{port}}/v2/users/capacity/exceptions/:userID"
method: POST
headers:
  - key: Content-Type
    value: application/json
    description: JSON request body
pathVariables:
  userID: ""
body:
  type: json
  content: |-
    {
      "exceptionStartDate": "2026-01-10",
      "exceptionEndDate": "2026-01-20",
      "capacityMinutes": 300,
      "exceptionTitle": "Training Week",
      "exceptionNotes": "Limited availability"
    }
examples: ./.resources/New Capacity Exception.resources/examples
order: 3000
