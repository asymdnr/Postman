$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/users/capacity/schedules?locations=\
    1,3&users=42,57&startDate=2026-01-05&endDate=2026-01-07&cursor=0&limit=100"
  method: GET
  queryParams:
    - key: locations
      value: 1,3
      description: Required comma-separated location IDs to scope users.
    - key: users
      value: 42,57
      description: Optional comma-separated user IDs filter.
    - key: startDate
      value: 2026-01-05
      description: Required start date (YYYY-MM-DD).
    - key: endDate
      value: 2026-01-07
      description: Required end date (YYYY-MM-DD), must be >= startDate and within 31 days.
    - key: cursor
      value: "0"
      description: Optional zero-based user offset for pagination.
    - key: limit
      value: "100"
      description: Optional page size (1-100).
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
        "range": {
          "startDate": "2026-01-05",
          "endDate": "2026-01-07"
        },
        "locations": [1, 3],
        "users": [
          {
            "userID": 42,
            "locations": [1],
            "days": [
              {
                "date": "2026-01-05",
                "capacityMinutes": 300,
                "hoursPerDay": 5,
                "minutesPerDay": 0,
                "isAvailable": true,
                "appliedRule": "userSchedule",
                "reason": "Capacity from user schedule",
                "reasonDetails": {
                  "scheduleID": 1201,
                  "profileID": null
                }
              }
            ]
          }
        ],
        "pagination": {
          "cursor": 0,
          "limit": 100,
          "totalUsers": 1,
          "nextCursor": null
        }
      }
order: 1000
