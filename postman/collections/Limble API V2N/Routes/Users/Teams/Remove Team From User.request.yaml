$kind: http-request
description: This request removes a Team from a User.
url: "{{protocol}}://{{server}}:{{port}}/v2/users/:userID/teams"
method: DELETE
headers:
  Content-Type: application/json
pathVariables:
  userID: "{{userID}}"
body:
  type: text
  content: "{\r

    \    \"teamID\": {{teamID}},\r

    \    \"locationID\": {{locationID}}\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"response should be okay to process\", function () { \r

      \    pm.response.to.not.be.error; \r

      \    pm.response.to.not.have.jsonBody(\"error\"); \r

      })"
    language: text/javascript
examples: ./.resources/Remove Team From User.resources/examples
order: 3000
