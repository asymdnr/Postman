$kind: http-request
description: This request gets all of the Teams a User has and what Location
  they have that Team at.
url: "{{protocol}}://{{server}}:{{port}}/v2/users/:userID/teams?teams=436,437&l\
  ocations=163,74&limit=100&cursor=0&name=%Manager%"
method: GET
queryParams:
  - key: teams
    value: 436,437
    description: This parameter expects a comma-separated list of teamIDs to filter teams by
  - key: locations
    value: 163,74
    description: This parameter expects a comma-separated list of locationIDs to
      filter teams by
  - key: limit
    value: "100"
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
  - key: cursor
    value: "0"
    description: This parameter is a cursor that selects what teamID you want to
      start receiving results at. e.g. passing 137 here will only get you tasks
      with an id greater than 137.
  - key: name
    value: "%Manager%"
    description: This parameter is used to only get specific team by name. This
      parameter expects a string full name of a user or partial name with the
      wildcard %.
pathVariables:
  - key: userID
    value: "{{userID}}"
    description: userID of the user you are selecting teams.
scripts:
  - type: afterResponse
    code: "pm.test(\"response must be valid and have a body\", function () {\r

      \     // assert that the status code is 200\r

      \     pm.response.to.be.ok; // info, success, redirection,
      clientError,  serverError, are other variants\r

      \     // assert that the response has a valid JSON body\r

      \     pm.response.to.be.withBody;\r

      \     pm.response.to.be.json; // this assertion also checks if a
      body  exists, so the above check is not needed\r

      });"
    language: text/javascript
examples: ./.resources/Get User Teams.resources/examples
order: 1000
