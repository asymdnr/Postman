$kind: http-request
description: >-
  This request gets information about Users such as User Login, User Email etc.


  <p><b>Return data description</b></p>

  <table>
      <thead>
          <tr>
              <th>Property</th>
              <th>Description</th>
          </tr>
      </thead>
      <tbody>
          <tr>
              <td>username</td>
              <td>What a User uses to login.</td>
          </tr>
          <tr>
              <td>wage</td>
              <td>The hourly rate of an employee.</td>
          </tr>
          <tr>
              <td>active</td>
              <td>Determines if a user can log into Limble or not.</td>
          </tr>
          <tr>
              <td>emailNotificationActive</td>
              <td>Determines if a User gets Email Notifications From Limble.</td>
          </tr>
          <tr>
              <td>pushNotificationActive</td>
              <td>Determines if a User gets Push Notifications From Limble.</td>
          </tr>
          <tr>
              <td>workdayHours</td>
              <td>The number of hours a day this employee works.</td>
          </tr>
          <tr>
              <td>dateAdded</td>
              <td>The date a user was added to Limble.  This is a unix timestamp.</td>
          </tr>
          <tr>
              <td>teams</td>
              <td>What Teams a User has at specific Locations.</td>
          </tr>
      </tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/users?users=342"
method: GET
queryParams:
  - key: users
    value: "342"
    description: This parameter expects a comma-separated list of users to get by id
  - key: name
    value: "%jeff%"
    disabled: true
    description: This parameter is used to only get specific user by name. This
      parameter expects a string full name of a user or partial name with the
      wildcard %.
  - key: roles
    value: "320"
    disabled: true
    description: This parameter expects a comma-separated list of users to get by roleID
  - key: teams
    value: 436,437
    disabled: true
    description: This parameter expects a comma-separated list of users to get by teamID
  - key: cursor
    value: "0"
    disabled: true
    description: This parameter is a cursor that selects what userID you want to
      start receiving results at. e.g. passing 137 here will only get you tasks
      with an id greater than 137.
  - key: limit
    value: "100"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
scripts:
  - type: afterResponse
    code: "pm.test(\"response must be valid and have a body\", function () {\r

      \     // assert that the status code is 200\r

      \     pm.response.to.be.ok; // info, success, redirection,
      clientError,  serverError, are other variants\r

      \     // assert that the response has a valid JSON body\r

      \     pm.response.to.be.withBody;\r

      \     pm.response.to.be.json; // this assertion also checks if a
      body  exists, so the above check is not needed\r

      });"
    language: text/javascript
examples: ./.resources/Users.resources/examples
order: 4000
