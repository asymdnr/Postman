$kind: http-request
description: >-
  This request updates a User details such as first name, last name, phone
  number, active status and more.



  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr>
  			<td>firstName</td>
  			<td>String</td>
  			<td>Optional</td>
  			<td>The User's first name.</td>
  		</tr>
  		<tr>
  			<td>lastName</td>
  			<td>String</td>
  			<td>Optional</td>
  			<td>The User's last name.</td>
  		</tr>
  		<tr>
  			<td>email</td>
  			<td>string</td>
  			<td>Optional</td>
  			<td>The User's email address.</td>
  		</tr>
  		<tr>
  			<td>username</td>
  			<td>string</td>
  			<td>Optional</td>
  			<td>The User's login name.</td>
  		</tr>
  		<tr>
  			<td>password</td>
  			<td>string</td>
  			<td>Optional</td>
  			<td>A new password for the User.</td>
  		</tr>
  		<tr>
  			<td>phone</td>
  			<td>string</td>
  			<td>Optional</td>
  			<td>The User's phone number.</td>
  		</tr>
  		<tr>
  			<td>wage</td>
  			<td>number</td>
  			<td>Optional</td>
  			<td>The User's wage per hour.</td>
  		</tr>
  		<tr>
  			<td>workDayHours</td>
  			<td>number</td>
  			<td>Optional</td>
  			<td>The User's hours per day they work.</td>
  		</tr>
  		<tr>
  			<td>active</td>
  			<td>Boolean</td>
  			<td>Optional</td>
  			<td>The User's activation status.</td>
  		</tr>
  		<tr>
  			<td>emailNotificationActive</td>
  			<td>Boolean</td>
  			<td>Optional</td>
  			<td>The User's email notification activation status.</td>
  		</tr>
  		<tr>
  			<td>pushNotificationActive</td>
  			<td>Boolean</td>
  			<td>Optional</td>
  			<td>The User's push notification activation status.</td>
  		</tr>
  	</tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/users/:userID"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  - key: userID
    value: "{{userID}}"
    description: userID of the user you are updating.
body:
  type: text
  content: |-
    {
    	"firstName": "Bryan",
    	"lastName": "Christiansen",
    	"email": "bryan@limblecmms.com",
        "username": "misterMan87",
        "password": "very$trong p4$$w0rD#",
    	"phone": "8015555555",
    	"wage": 16,
    	"workDayHours": 8,
    	"active": true,
    	"emailNotificationActive": false,
    	"pushNotificationActive": false
    }
scripts:
  - type: afterResponse
    code: "pm.test(\"response must be valid and have a body\", function () {\r

      \     // assert that the status code is 200\r

      \     pm.response.to.be.ok; // info, success, redirection,
      clientError,  serverError, are other variants\r

      });"
    language: text/javascript
examples: ./.resources/Update User.resources/examples
order: 6000
