$kind: http-request
description: This request attaches a Suggested Field to a Vendor.
url: "{{protocol}}://{{server}}:{{port}}/v2/vendors/:vendorID/fields"
method: PUT
headers:
  Content-Type: application/json
  Accept: text/html
pathVariables:
  vendorID: "1"
body:
  type: text
  content: |-
    {
    	"fieldID": {{vendorFieldID}},
    	"locationID": {{locationID}}
    }
scripts:
  - type: afterResponse
    code: |+
      const valueID = pm.response.json().valueID;

      pm.test("response is created", () => {
          pm.response.to.have.status(201);
      });

      pm.globals.set('vendorValueID', valueID);

    language: text/javascript
examples: ./.resources/Attach Field to Vendor.resources/examples
order: 4000
