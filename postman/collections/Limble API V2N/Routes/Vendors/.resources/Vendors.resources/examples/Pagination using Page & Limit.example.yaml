$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/vendors?locations=163&limit=2&page=1"
  method: GET
  queryParams:
    - key: vendors
      value: "9"
      disabled: true
      description: This parameter is used to only get specific Vendors. This parameter
        expects a comma delimited list of Vendor IDs.
    - key: locations
      value: "163"
      description: This parameter is used to only get Vendors at a specific group of
        Locations. This parameter accepts a comma delimited list of Location
        IDs.
    - key: name
      value: "%test%"
      disabled: true
      description: This parameter is used to only get specific vendor by name. This
        parameter expects a string full name of a vendor or partial name with
        the wildcard %.
    - key: start
      value: "1560233040"
      disabled: true
      description: This parameter is used to only get Vendors that were last edited
        after the unix timestamp passed into the start parameter. For example,
        all Vendors that were last edited after April 18th, 2018.
    - key: end
      value: "1613665140"
      disabled: true
      description: This parameter is used to only get Vendors that were last edited
        *before* the unix timestamp passed into the end parameter.
    - key: cursor
      value: "0"
      disabled: true
      description: This parameter is a cursor that selects what vendorID you want to
        start receiving results at. e.g. passing 137 here will only get you
        vendors with an id greater than 137.
    - key: limit
      value: "2"
      description: This parameter is a result limiter. The default is set to return no
        more than 100 results at one time.
    - key: page
      value: "1"
      description: This parameter is used to paginate results based on the limit.
        Refer to Pagination section for more information.
