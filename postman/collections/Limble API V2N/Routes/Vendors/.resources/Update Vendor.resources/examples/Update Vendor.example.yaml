$kind: http-example
request:
  url: https://api.limblecmms.com:443/v2/vendors/:vendorID
  method: PATCH
  headers:
    Content-Type: application/json
  pathVariables:
    vendorID: "{{vendorID}}"
  body:
    type: json
    content: |-
      {
      	"locationID": "163",
      	"name": "{{newVendorName}}",
      	"email": "{{newVendorEmail}}",
      	"phone": "15555555555",
      	"contact": "Bill Frost",
          "address": "123 North Ave"
      }
