$kind: http-request
description: |-
  This request adds files to a log.

  <p><b>Return data description</b></p>

  <table><tbody><tr><th>Property</th><th>Description</th></tr><tr><td>fileID</td><td>The ID of the file attached to the log.</td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/vendors/:vendorID/logs/:logID/file"
method: PUT
pathVariables:
  - key: vendorID
    value: "9"
    description: The ID of the vendor the log belongs to.
  - key: logID
    value: "11"
    description: The ID of the log to attach the file to.
body:
  type: formdata
  content:
    - type: file
      key: file
      src: /C:/Users/Hely Mehta/Downloads/lorem-ipsum.pdf
examples: ./.resources/Add Vendor Log File.resources/examples
order: 2000
