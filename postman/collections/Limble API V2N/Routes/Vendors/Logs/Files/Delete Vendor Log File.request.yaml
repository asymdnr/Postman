$kind: http-request
description: This requests deletes a file attached to a log.
url: "{{protocol}}://{{server}}:{{port}}/v2/vendors/logs/file/:fileID"
method: DELETE
pathVariables:
  - key: fileID
    value: "7"
    description: The ID of the file attached to the log.
examples: ./.resources/Delete Vendor Log File.resources/examples
order: 1000
