$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/vendors/logs/:logID"
  method: PATCH
  pathVariables:
    - key: logID
      value: "11"
      description: The ID of the log to be updated.
  body:
    type: json
    content: "{\r

      \    \"logEntry\": \"Changing log\"\r

      }"
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
