$kind: http-request
description: |-
  This creates a manual log entry for a vendor.

  <table><tbody><tr><th>Parameter</th><th>Type</th><th>Required?</th><th>Description</th></tr><tr><td>userID</td><td>Int</td><td>Required</td><td>The ID of the user creating the log.</td></tr><tr><td>logEntry</td><td>String</td><td>Required</td><td>Details of the log.</td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/vendors/:vendorID/logs"
method: POST
pathVariables:
  - key: vendorID
    value: "9"
    description: The ID of the vendor for which the log will be created.
body:
  type: json
  content: "{\r

    \    \"userID\": 342,\r

    \    \"logEntry\": \"Creating a log\"\r

    }"
examples: ./.resources/New Vendor Log.resources/examples
order: 3000
