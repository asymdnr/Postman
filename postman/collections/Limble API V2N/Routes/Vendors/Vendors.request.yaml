$kind: http-request
description: >-
  This request gets information such as VendorIDs, Vendor Names, etc.


  This call returns a "meta" object containing URLs that can be used to get data
  related to a vendor.


  This call will also return an image array of objects that have a file name and
  a link you can use to download that image. All links are only valid for 15
  minutes, a new call will generate a new link.


  **Note:** this endpoint supports pagination. Please refer to the
  [**Pagination**](#pagination) section for more information.
url: "{{protocol}}://{{server}}:{{port}}/v2/vendors"
method: GET
queryParams:
  - key: vendors
    value: "9"
    disabled: true
    description: This parameter is used to only get specific Vendors. This parameter
      expects a comma delimited list of Vendor IDs.
  - key: locations
    value: "163"
    disabled: true
    description: This parameter is used to only get Vendors at a specific group of
      Locations. This parameter accepts a comma delimited list of Location IDs.
  - key: name
    value: "%test%"
    disabled: true
    description: This parameter is used to only get specific vendor by name. This
      parameter expects a string full name of a vendor or partial name with the
      wildcard %.
  - key: start
    value: "1560233040"
    disabled: true
    description: This parameter is used to only get Vendors that were last edited
      after the unix timestamp passed into the start parameter. For example, all
      Vendors that were last edited after April 18th, 2018.
  - key: end
    value: "1613665140"
    disabled: true
    description: This parameter is used to only get Vendors that were last edited
      *before* the unix timestamp passed into the end parameter.
  - key: cursor
    value: "0"
    disabled: true
    description: This parameter is a cursor that selects what vendorID you want to
      start receiving results at. e.g. passing 137 here will only get you
      vendors with an id greater than 137.
  - key: limit
    value: "2"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
  - key: page
    value: "1"
    disabled: true
    description: This parameter is used to paginate results based on the limit.
      Refer to Pagination section for more information.
scripts:
  - type: afterResponse
    code: "pm.test(\"response must be valid and have a body\", function () {\r

      \     // assert that the status code is 200\r

      \     pm.response.to.be.ok; // info, success, redirection,
      clientError,  serverError, are other variants\r

      \     // assert that the response has a valid JSON body\r

      \     pm.response.to.be.withBody;\r

      \     pm.response.to.be.json; // this assertion also checks if a
      body  exists, so the above check is not needed\r

      });"
    language: text/javascript
examples: ./.resources/Vendors.resources/examples
order: 4000
