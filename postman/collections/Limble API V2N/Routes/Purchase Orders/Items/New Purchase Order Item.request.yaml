$kind: http-request
description: |-
  This request creates a new Purchase Order Item.

  <p><br><br></p><p><br><br><br></p><table><tbody><tr><th>Parameter</th><th>Type</th><th>Required?</th><th>Description</th></tr><tr><td>itemType</td><td>Int</td><td>Required</td><td>A number describing what type of PO Item this is. Valid values are: 1 (Part), 2 (Service), 4 (Other). If itemType is 1, name and taskID cannot be present and partID is required. If itemType is 2 or 4, name is required and partID cannot be present. If itemType is 2, a checklistID is required.</td></tr><tr><td>name</td><td>String</td><td>Optional</td><td>A short line-item title for this PO Item.</td></tr><tr><td>description</td><td>String</td><td>Optional</td><td>A more detailed description for this PO Item.</td></tr><tr><td>glID</td><td>Int</td><td>Optional</td><td>The ID of the General Ledger that this PO Item will belong to.</td></tr><tr><td>taskID</td><td>Int</td><td>Optional</td><td>The ID of the Task that this PO Item will belong to.</td></tr><tr><td>assetID</td><td>Int</td><td>Optional</td><td>The ID of the Asset that this PO Item will belong to.</td></tr><tr><td>partID</td><td>Int</td><td>Optional</td><td>The ID of the Part that this PO Item will belong to.</td></tr><tr><td>quantity</td><td>Int</td><td>Optional</td><td>A number for how many items are represented in this line. If not provided, the minimum and default values are 1.</td></tr><tr><td>rate</td><td>Float</td><td>Optional</td><td>A decimal (precision 4) representing the cost of one of the item(s). Default is 0.0000</td></tr><tr><td>tax</td><td>Float</td><td>Optional</td><td>A decimal (precision 4) representing the amount of tax on the item(s) as a percent. Default is 0.0000</td></tr><tr><td>discount</td><td>Float</td><td>Optional</td><td>A decimal (precision 4) representing the discounted cost on the item(s) as a percent. Default is 0.0000</td></tr><tr><td>shipping</td><td>Float</td><td>Optional</td><td>A decimal (precision 4) representing the cost of shipping for the item(s). Default is 0.0000</td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/po/:poID/items"
method: POST
pathVariables:
  poID: "1"
body:
  type: json
  content: |-
    {
        "itemType": 1,
        "glID": 2,
        "assetID": 3,
        "partID": 4,
        "quantity": 1,
        "rate": 12.99,
        "tax": 10,
        "discount": 3,
        "shipping": 1.2345
    }
examples: ./.resources/New Purchase Order Item.resources/examples
order: 2000
