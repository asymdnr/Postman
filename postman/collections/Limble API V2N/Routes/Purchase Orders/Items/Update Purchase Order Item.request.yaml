$kind: http-request
description: |-
  <p>This request updates a Purchase Order Item. Considering the validation for this route is non-trivial -- keep in mind that before this update takes place, we validate the <i>resulting</i> PO Item, so the itemType must be valid with any existing or updated properties. For example, if you have a PO Item of itemType 1 (Part) and attempt to send a PATCH that only provides a checklistID, you will get an error back saying that this is an invalid combination.</p>

  <p>To remove an associated ID, pass in the value 0.</p>

  <p><br><br></p><p><br><br><br></p><table><tbody><tr><th>Parameter</th><th>Type</th><th>Required?</th><th>Description</th></tr><tr><td>itemType</td><td>Int</td><td>Optional</td><td>A number describing what type of PO Item this is. Valid values are: 1 (Part), 2 (Service), 4 (Other). If itemType is 1, name and taskID cannot be present and partID is required. If itemType is 2 or 4, name is required and partID cannot be present. If itemType is 2, a checklistID is required.</td></tr><tr><td>name</td><td>String</td><td>Optional</td><td>A short line-item title for this PO Item.</td></tr><tr><td>description</td><td>String</td><td>Optional</td><td>A more detailed description for this PO Item.</td></tr><tr><td>glID</td><td>Int</td><td>Optional</td><td>The ID of the General Ledger that this PO Item will belong to.</td></tr><tr><td>taskID</td><td>Int</td><td>Optional</td><td>The ID of the Task that this PO Item will belong to.</td></tr><tr><td>assetID</td><td>Int</td><td>Optional</td><td>The ID of the Asset that this PO Item will belong to.</td></tr><tr><td>partID</td><td>Int</td><td>Optional</td><td>The ID of the Part that this PO Item will belong to.</td></tr><tr><td>quantity</td><td>Int</td><td>Optional</td><td>A number for how many items are represented in this line. If not provided, the minimum and default values are 1.</td></tr><tr><td>rate</td><td>Float</td><td>Optional</td><td>A decimal (precision 4) representing the cost of one of the item(s). Default is 0.0000</td></tr><tr><td>tax</td><td>Float</td><td>Optional</td><td>A decimal (precision 4) representing the amount of tax on the item(s) as a percent. Default is 0.0000</td></tr><tr><td>discount</td><td>Float</td><td>Optional</td><td>A decimal (precision 4) representing the discounted cost on the item(s) as a percent. Default is 0.0000</td></tr><tr><td>shipping</td><td>Float</td><td>Optional</td><td>A decimal (precision 4) representing the cost of shipping for the item(s). Default is 0.0000</td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/po/:poID/items/:poItemID"
method: PATCH
pathVariables:
  poID: "1"
  poItemID: "2"
body:
  type: json
  content: |-
    {
        "itemType": 1,
        "glID": 0,
        "assetID": 0,
        "partID": 4,
        "quantity": 5,
        "rate": 3.50,
        "tax": 7.25,
        "discount": 0,
        "shipping": 24.99
    }
examples: ./.resources/Update Purchase Order Item.resources/examples
order: 3000
