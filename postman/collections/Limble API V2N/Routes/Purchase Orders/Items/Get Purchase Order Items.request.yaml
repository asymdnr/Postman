$kind: http-request
description: |-
  This request gets information associated with PO items. Every line item on a PO is an item returned by this call.

  <p><b>Return data description</b></p>

  <table><tbody><tr><th>Property</th><th>Description</th></tr><tr><td><div>poID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The unique ID of the purchase order associated to this item.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>poItemID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The unqiue ID of this Purchase Order Item</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>itemType</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Which type (Part, Service, or Other) this item is.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>name</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The name of the item.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>description</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>A more detailed description of the item.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>glID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The unique ID of the GL associated to this item.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>partID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The unique ID of the part associated to this item.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>taskID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The unique ID of the task associated to this item.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>poNumber</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The user-set Purchase Order number.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>qty</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The quantity purchased.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>rate</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The billing rate for the item on the Purchase Order.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>tax</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The tax percent rate for the item on the Purchase Order.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>discount</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The discount percent rate for the item on the Purchase Order.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>shipping</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The shipping rate for the item on the Purchase Order.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>qtyReceived</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>A number representing the total quantity that has been marked as "received" for this item.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>lastEdited</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Last time this PO item was edited, this field outputs a UNIX timestamp.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>orderUnitAbbreviation</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The abbreviation for the unit of measure in which the PO item was ordered. (NULL for items not assigned to a unit of measure)</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/po/items?pos=1,2,3&items=45,8998,34\
  34&numbers=1,2&cursor=112&limit=100&lastEditedStart=1518559856&lastEditedEnd=\
  1518559856"
method: GET
queryParams:
  - key: pos
    value: 1,2,3
    description: This parameter is used to only get specific POs. This parameter
      expects a comma delimited list of PO IDs.
  - key: items
    value: 45,8998,3434
    description: This parameter is used to only get specific PO Items by ID. This
      parameter expects a comma delimited list of poItem IDs.
  - key: numbers
    value: 1,2
    description: This parameter is used to only get specific POs by Number. This
      parameter expects a comma delimited list of PO Numbers.
  - key: cursor
    value: "112"
    description: This parameter is a cursor that selects what vendorID you want to
      start receiving results at. e.g. passing 137 here will only get you
      vendors with an id greater than 137.
  - key: limit
    value: "100"
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
  - key: lastEditedStart
    value: "1518559856"
    description: This parameter is used to only get PO items that were last edited
      after the unix timestamp passed into the start parameter. For example, all
      PO items that were last edited after April 18th, 2018.
  - key: lastEditedEnd
    value: "1518559856"
    description: This parameter is used to only get POs items that were last edited
      *before* the unix timestamp passed in.
scripts:
  - type: afterResponse
    code: "pm.test(\"response must be valid and have a body\", function () {\r

      \     // assert that the status code is 200\r

      \     pm.response.to.be.ok; // info, success, redirection,
      clientError,  serverError, are other variants\r

      \     // assert that the response has a valid JSON body\r

      \     pm.response.to.be.withBody;\r

      \     pm.response.to.be.json; // this assertion also checks if a
      body  exists, so the above check is not needed\r

      });"
    language: text/javascript
examples: ./.resources/Get Purchase Order Items.resources/examples
order: 1000
