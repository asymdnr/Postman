$kind: http-request
description: |-
  This request gets all PO Comments associated with a PO.

  <p><b>Return data description</b></p>

  <p><br><br></p><p><br><br><br></p><table><tbody><tr><th>Property</th><th>Description</th></tr><tr><td><div>commentID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>This is the commentID of comment.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>comment</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The text comment that was entered by the user.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>timestamp</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The date this comment was created. This is a unix timestamp.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>userID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The ID of the user that made the comment.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>commentEmailAddress</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The email address of the external user that made this comment. This is only populated if the comment was made by an external user via the comment reply system.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>commentFiles</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Array containing fileName and link properties.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/po/:poID/comments?cursor=0&limit=100"
method: GET
queryParams:
  - key: cursor
    value: "0"
    description: This parameter is a cursor that selects what commentID you want to
      start receiving results at. e.g. passing 137 here will only get you
      comments with an id greater than 137.
  - key: limit
    value: "100"
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
pathVariables:
  - key: poID
    value: "453"
    description: poID of the Purchase Order you are getting comments for.
examples: ./.resources/PO Comments.resources/examples
order: 1000
