$kind: http-request
description: |-
  Adds a comment to the specified PO.

  Parameters:

  | Parameter | In | Type | Required | Default | Description |
  |---|---|---|---|---|---|
  | poID | path | integer | yes |  | Purchase Order identifier |
  | comment | body | string | yes |  | Comment text |
  | showExternalUsers | body | boolean | no | true | Visible to external users |

  Responses:
  - 201 Created: Returns commentID.
url: "{{protocol}}://{{server}}:{{port}}/v2/po/:poID/comments"
method: POST
headers:
  Content-Type: application/json
pathVariables:
  poID: "1234"
body:
  type: text
  content: |-
    {
      "comment": "Please expedite shipping",
      "showExternalUsers": true
    }
examples: ./.resources/Create PO Comment.resources/examples
order: 4000
