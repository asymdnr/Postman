$kind: http-request
description: >-
  Returns the list of valid next states for the specified PO.


  Parameters:


  | Parameter | Type | Required | Default | Description |

  | --- | --- | --- | --- | --- |

  | poID | integer | yes |  | Purchase Order identifier |


  Return data:  
    
  Array of JSON objects listing possible next state transitions for the selected
  PO.
url: "{{protocol}}://{{server}}:{{port}}/v2/po/:poID/state/transitions"
method: GET
pathVariables:
  - key: poID
    value: "31939"
    description: Purchase Order identifier
examples: ./.resources/Get PO State Transitions.resources/examples
order: 2000
