$kind: http-request
description: >-
  This request gets your Parts usage log.


  <p><b>Return data description</b></p>


  <table>
      <thead>
          <tr>
              <th>Property</th>
              <th>Description</th>
          </tr>
      </thead>
      <tbody>
          <tr>
              <td>meta</td>
              <td>A call which can be used to quickly look up the Task that this part's usage was recorded on.</td>
          </tr>
          <tr>
              <td>name</td>
              <td>The name of the part used.</td>
          </tr>
          <tr>
              <td>taskID</td>
              <td>The associated Task where this part was used.</td>
          </tr>
          <tr>
              <td>usedCount</td>
              <td>The number of parts that were used.</td>
          </tr>
          <tr>
              <td>usedPrice</td>
              <td>The price per 1 part.</td>
          </tr>
          <tr>
              <td>usedOn</td>
              <td>The date when the part was used.  This is a unix timestamp.</td>
          </tr>
          <tr>
              <td>poItemID</td>
              <td>The unique ID of the PO item associated with this usage record.</td>
          </tr>
      </tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/parts/usage"
method: GET
queryParams:
  - key: parts
    value: "2"
    disabled: true
    description: This parameter is used to only get specific Parts. This parameter
      accepts a comma delimited list of part IDs.
  - key: tasks
    value: 8,10
    disabled: true
    description: This parameter is used to only get Parts at a specific group of
      Tasks. This parameter accepts a comma delimited list of Task IDs.
  - key: start
    value: "1457663400"
    disabled: true
    description: This parameter is used to only get Parts that were last edited
      after the unix timestamp passed into the start parameter. For example, all
      Assets that were last edited after April 18th, 2018.
  - key: end
    value: "1457663400"
    disabled: true
    description: This parameter is used to only get Parts that were last edited
      *before* the unix timestamp passed into the end parameter.
  - key: name
    value: "%Pro%"
    disabled: true
    description: This parameter is used to string search part names either partial
      or full name with the wildcard %.
  - key: cursor
    value: "0"
    disabled: true
    description: This parameter is a cursor that selects what partID you want to
      start receiving results at. e.g. passing 137 here will only get you part
      usage records with an id greater than 137.
  - key: limit
    value: "100"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
scripts:
  - type: afterResponse
    code: |
      const firstPartUsage = pm.response.json()[0];

      pm.test('status ok', () => {
         pm.expect(pm.response.code).to.eql(200);
      });

      pm.globals.set('partUsageID', firstPartUsage.id);
    language: text/javascript
examples: ./.resources/Parts Usage.resources/examples
order: 11000
