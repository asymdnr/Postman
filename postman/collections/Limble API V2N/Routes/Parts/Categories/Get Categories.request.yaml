$kind: http-request
url: "{{protocol}}://{{server}}:{{port}}/v2/parts/categories/"
method: GET
headers:
  Content-Type: application/json
queryParams:
  - key: categories
    value: "1"
    disabled: true
    description: This parameter is used to only get specific part categories. This
      parameter accepts a comma delimited list of categoryIDs.
  - key: name
    value: Electronics
    disabled: true
    description: This parameter is used to string search part categories names
      either partial or full name with the wildcard %.
body:
  type: text
  content: |-
    {
    	"name": "Electronics"
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Get Categories.resources/examples
order: 2000
