$kind: http-request
description: This request will remove the Part Category from all Parts and from
  possible Categories.
url: "{{protocol}}://{{server}}:{{port}}/v2/parts/categories/:categoryID"
method: DELETE
headers:
  Content-Type: application/json
pathVariables:
  - key: categoryID
    value: "{{categoryID}}"
    description: categoryID of the category you wish to remove.
scripts:
  - type: beforeRequest
    code: pm.globals.set('newLocationName', `new location -
      ${Math.floor(Math.random() * 10000000)}`);
    language: text/javascript
  - type: afterResponse
    code: |
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Delete Part Category.resources/examples
order: 4000
