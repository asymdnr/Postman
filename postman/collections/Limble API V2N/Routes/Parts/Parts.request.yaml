$kind: http-request
description: |-
  This request returns a list of Parts with top level information such as name, last edited, etc.

  **Note:** this endpoint supports pagination. Please refer to the [<b>Pagination</b>](#pagination) section for more information.

  <p><b>Return data description</b></p>

  <table><tbody><tr><th>Property</th><th>Description</th></tr><tr><td><div>number</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Part's Number. e.g. 25x25x1</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>name</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Part's Name. e.g. Filter</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>generalStock</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>How many of this Part you have in stock. Not including purchase orders.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>unitCode</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The unit code displayed for the part. This represents the unit of measure assigned to the part (e.g., "kg", "lb", "each", etc.). If no unit is assigned, this field will be null.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>generalPrice</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The default price of this part. Not considering purchase oder prices.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>category</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The category this Part belongs to</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>location</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Location of this Part. e.g. Shelf A</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>minQtyStatus</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Is the Part currently under the min quantity threshold. 0 = false, 1 = true.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>minQtyThreshold</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The number at which reordering of this part is triggered. -1 means this feature is turned off.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>maxQtyThreshold</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The number to bring the parts quantity back to. For example, if my inventory is at 4 and my maxQtyThreshold is 20 I will be reordering 16 parts to bring my inventory back up to the max quantity.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>staleThreshold</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>This value is how many days will need to go without a User using this Part by before this Part is considering stale.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>staleStatus</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Is the Part stale or not. 0 = false, 1 = true.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>userID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The user that will receive threshold notifications and Tasks if thresholds are hit.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>team</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The team that will receive threshold notifications and Tasks if thresholds are hit.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>stockOnHand</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>General Stock plus any unused, received PO Quantities for this part. This matches the 'Qty' value seen in the CMMS Part Management page.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>pos</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Array of purchase order objects. price and quantity do not effect generalStock and generalPrice listed above.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>image</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Array of objects that have a file name and a link you can use to download that image. All links are only valid for 15 minutes, a new call will generate a new link.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/parts/"
method: GET
queryParams:
  - key: parts
    value: 1,2
    disabled: true
    description: This parameter is used to only get specific Parts. This parameter
      accepts a comma delimited list of part IDs.
  - key: locations
    value: "73"
    disabled: true
    description: This parameter is used to only get Parts at a specific group of
      Locations. This parameter accepts a comma delimited list of Location IDs.
  - key: name
    value: "%blade%"
    disabled: true
    description: This parameter is used to only get specific parts. This parameter
      expects a string either a full name of a part or a partial name with the
      wildcard %.
  - key: start
    value: "1564895015"
    disabled: true
    description: This parameter is used to only get Parts that were last edited
      after the unix timestamp passed into the start parameter. For example, all
      Parts that were last edited after April 18th, 2018.
  - key: end
    value: "1564895015"
    disabled: true
    description: This parameter is used to only get Parts that were last edited
      *before* the unix timestamp passed into the end parameter.
  - key: cursor
    value: "0"
    disabled: true
    description: This parameter is a cursor that selects what partID you want to
      start receiving results at. e.g. passing 137 here will only get you parts
      with an id greater than 137.
  - key: limit
    value: "100"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
  - key: numbers
    value: 25x25x1 - Vendor b - location 2
    disabled: true
    description: This parameter is used to only get parts with part numbers that
      match the list provided. This parameter accepts a comma delimited list of
      Part Numbers.
  - key: page
    value: "2"
    disabled: true
    description: "This parameter is used to paginate results based on the limit.
      Refer to Pagination section for more information. "
scripts:
  - type: afterResponse
    code: "pm.test(\"response is ok\", function () {\r

      \    pm.response.to.have.status(200);\r

      });"
    language: text/javascript
examples: ./.resources/Parts.resources/examples
order: 7000
