$kind: http-request
description: This request removes the main image from a Part.
url: "{{protocol}}://{{server}}:{{port}}/v2/parts/:partID/image"
method: DELETE
headers:
  Content-Type: application/json
pathVariables:
  - key: partID
    value: "{{partID}}"
    description: partID of the part you are removing the image for.
scripts:
  - type: afterResponse
    code: |+
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });

    language: text/javascript
examples: ./.resources/Delete Part Image.resources/examples
order: 2000
