$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/parts/:partID/logs?logs=21524&users\
    =340&logEntry=%new%&start=1663018000&end=1663018900&limit=10"
  method: GET
  queryParams:
    - key: logs
      value: "21524"
      description: This parameter is used to only get specific logs. This parameter
        accepts a comma delimited list of logIDs.
    - key: sources
      value: "4"
      disabled: true
      description: This parameter is used to only get logs for a specific sourceID.
        This parameter accepts a comma delimited list of sourceIDs.
    - key: users
      value: "340"
      description: This parameter is used to only get logs created by specific users.
        This parameter accepts a comma delimited list of userIDs.
    - key: logEntry
      value: "%new%"
      description: "This is a parameter used to string search for manual log entry
        (sourceID: 4). This parameter expects a string with the wildcard %."
    - key: start
      value: "1663018000"
      description: "This parameter is used to only get logs that were last edited
        after the unix timestamp passed into the start parameter. "
    - key: end
      value: "1663018900"
      description: This parameter is used to only get logs that were last edited
        before the unix timestamp passed into the end parameter.
    - key: page
      value: "1"
      disabled: true
      description: This parameter is used to paginate results based on the limit.
        Refer to Pagination section for more information.
    - key: limit
      value: "10"
      description: This parameter is a result limiter. The default is set to return no
        more than 100 results at one time.
    - key: cursor
      value: ""
      disabled: true
      description: "This parameter is a cursor that selects what ID you want to start
        receiving results at. "
  pathVariables:
    - key: partID
      value: "1"
      description: The ID of the part you need logs for.
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
