$kind: http-request
description: |-
  This request creates a manual log entry for a part.

  This request adds a new Field to the list of Suggested Fields that can later be attached to Parts.

  <p></p><table><tbody><tr><th>Parameter</th><th>Type</th><th>Required?</th><th>Description</th></tr><tr><td>userID</td><td>Int</td><td>Required</td><td>The ID of the user creating the log.</td></tr><tr><td>logEntry</td><td>String</td><td>Required</td><td>Details of the log.</td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/parts/:partID/logs"
method: POST
pathVariables:
  partID: "159"
body:
  type: json
  content: "{\r

    \    \"userID\": 342,\r

    \    \"logEntry\": \"Creating a log\"\r

    }"
examples: ./.resources/New Part Log.resources/examples
order: 2000
