$kind: http-request
description: |-
  This request returns the log entries for a part.

  **Note:** this endpoint supports pagination. Please refer to the [<b>Pagination</b>](#pagination) section for more information.

  <p><b>Return data description</b></p>

  <table><tbody><tr><th>Property</th><th>Description</th></tr><tr><td><div>logID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The unique logID of the log.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>dateCreated</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The date the log was created as a UNIX timestamp.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>partID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The partID the log belongs to.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>sourceID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The sourceID of the source of the log. The sourceID can be as follows:<br>1: Part name was changed.<br>2: Part Number was changed.<br>3: Parts were added/removed.<br>4: Manual log entry.<br>5: Parts were used on a Task.<br>6: Part Price was changed.<br>7: Stale threshold was manually changed.<br>8: Part Qty threshold was manually changed.<br>11: Part Qty threshold status was changed.<br>13: Part Location was changed.<br>14: Part Vendor was changed.<br>15: Part Image was changed.<br>18: Parts were received on a Bill.<br>19: Part Maximum Part Qty was manually changed.<br>20: Some of a PO Item Received Qty was used during manual Part Qty adjustment</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>logEntry</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The log entry for the part.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>userID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The ID of the user that created the log.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>associatedID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The ID of the item associated with this log, if any. Current examples include:<br>sourceID: 5, associatedID type: Task<br>sourceID: 18, associatedID type: Bill<br>sourceID: 20, associatedID type: Bill</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/parts/:partID/logs"
method: GET
queryParams:
  - key: logs
    value: "21524"
    disabled: true
    description: This parameter is used to only get specific logs. This parameter
      accepts a comma delimited list of logIDs.
  - key: sources
    value: "4"
    disabled: true
    description: This parameter is used to only get logs for a specific sourceID.
      This parameter accepts a comma delimited list of sourceIDs.
  - key: users
    value: "340"
    disabled: true
    description: This parameter is used to only get logs created by specific users.
      This parameter accepts a comma delimited list of userIDs.
  - key: logEntry
    value: "%new%"
    disabled: true
    description: "This is a parameter used to string search for manual log entry
      (sourceID: 4). This parameter expects a string with the wildcard %."
  - key: start
    value: "1663018000"
    disabled: true
    description: "This parameter is used to only get logs that were last edited
      after the unix timestamp passed into the start parameter. "
  - key: end
    value: "1663018900"
    disabled: true
    description: This parameter is used to only get logs that were last edited
      before the unix timestamp passed into the end parameter.
  - key: page
    value: "1"
    disabled: true
    description: This parameter is used to paginate results based on the limit.
      Refer to Pagination section for more information.
  - key: limit
    value: "10"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
  - key: cursor
    value: ""
    disabled: true
    description: "This parameter is a cursor that selects what ID you want to start
      receiving results at. "
pathVariables:
  - key: partID
    value: "1"
    description: The ID of the part you need logs for.
examples: ./.resources/Part Logs.resources/examples
order: 1000
