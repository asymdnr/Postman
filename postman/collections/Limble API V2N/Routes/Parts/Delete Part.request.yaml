$kind: http-request
description: This request removes a Part from your inventory list.
url: "{{protocol}}://{{server}}:{{port}}/v2/parts/:partID"
method: DELETE
headers:
  Content-Type: application/json
pathVariables:
  - key: partID
    value: "{{partID}}"
    description: partID of the part you are removing.
scripts:
  - type: afterResponse
    code: |-
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Delete Part.resources/examples
order: 10000
