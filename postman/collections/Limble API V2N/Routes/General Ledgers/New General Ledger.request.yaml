$kind: http-request
description: |-
  This request creates a new General Ledger.

  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr>
  			<td>locationID</td>
  			<td>Int</td>
  			<td>Required</td>
  			<td>The ID of the location this GL will be created for.</td>
  		</tr>
  		<tr>
  			<td>assetID</td>
  			<td>Int</td>
  			<td>Required</td>
  			<td>The ID of the asset that this GL will be associated with.</td>
  		</tr>
  		<tr>
  			<td>abbr</td>
  			<td>String</td>
  			<td>Required</td>
  			<td>An short version of this GLs name.</td>
  		</tr>
  		<tr>
  			<td>name</td>
  			<td>String</td>
  			<td>Required</td>
  			<td>A full title for this GL.</td>
  		</tr>
  		<tr>
  			<td>description</td>
  			<td>String</td>
  			<td>Optional</td>
  			<td>Any further needed description for this GL.</td>
  		</tr>
  	</tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/gl"
method: POST
body:
  type: json
  content: |-
    {
        "locationID": 63,
        "assetID": 8895,
        "abbr": "OFF1",
        "name": "Office 1",
        "description": "Any general supplies for Office 1"
    }
examples: ./.resources/New General Ledger.resources/examples
order: 2000
