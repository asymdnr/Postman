$kind: http-request
description: |-
  This request gets all Task Comments associated with a Task.

  <p><b>Return data description</b></p>

  <table><tbody><tr><th>Property</th><th>Description</th></tr><tr><td><div>commentID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>This is the commentID of comment.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>comment</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The text comment that was entered by the user.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>timestamp</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The date this comment was created. This is a unix timestamp.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>userID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The ID of the user that made the comment.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>commentEmailAddress</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The email address of the external user that made this comment. This is only populated if the comment was made by an external user via the comment reply system.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>showExternalUsers</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The comment can be seen by external users or not.<br>default value : true</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>commentFiles</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Array of objects that have a file name and a link you can use to download that file. All links are only valid for 15 minutes, a new call will generate a new link.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/tasks/:taskID/comments"
method: GET
queryParams:
  - key: cursor
    value: "0"
    disabled: true
    description: This parameter is a cursor that selects what commentID you want to
      start receiving results at. e.g. passing 137 here will only get you parts
      with an id greater than 137.
  - key: limit
    value: "100"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
pathVariables:
  - key: taskID
    value: "19696"
    description: taskID of the task you are getting comments for.
scripts:
  - type: afterResponse
    code: "pm.test(\"response must be valid and have a body\", function () {\r

      \     // assert that the status code is 200\r

      \     pm.response.to.be.ok; // info, success, redirection,
      clientError,  serverError, are other variants\r

      \     // assert that the response has a valid JSON body\r

      \     pm.response.to.be.withBody;\r

      \     pm.response.to.be.json; // this assertion also checks if a
      body  exists, so the above check is not needed\r

      });"
    language: text/javascript
examples: ./.resources/Task Comments.resources/examples
order: 1000
