$kind: http-request
description: |-
  Retrieves instructions across multiple tasks, by taskID.

  <p><b>Return data description</b></p>

  <table><tbody><tr><th>Property</th><th>Description</th></tr><tr><td><div>parentInstructionID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>This is the instructionID of the Instruction's parent. If this value is 0 then this Instruction does not have a parent.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>instruction</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The text that guides a User on what to do on this Instruction.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>type</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The type of the Instruction. See the request Post New Task Instruction to see a list of possible types and their meaning.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>instructionFiles</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Array of objects that have a file name and a link you can use to download that file. All links are only valid for 15 minutes, a new call will generate a new link.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>options</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Array of objects that have an itemOptionID, itemOptionOrder, and itemOptionText.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>response</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>This field is the "response" of an instruction i.e. what a user filled out when doing this instruction. The return value changes based on the instruction type:<br>1 Check Box - true/false<br>2 Radio List - if no option is selected, this will be 0. If an option is selected, this will be a number that maps to the itemOptionID of one of the members of the options array.<br>3 Text Box - string<br>4 Dropdown Box - if no option is selected, this will be 0. If an option is selected, this will be a number that maps to the itemOptionID of one of the members of the options array.<br>5 Date Picker - unix time stamp<br>7 Label - labels will never have a user response<br>9 File or Picture Attachment - Array of objects that have a file name and a link you can use to download that image. All links are only valid for 15 minutes, a new call will generate a new link.<br>10 Assign PM - not supported yet.<br>13 Number - integer<br>14 Start WO - not supported yet.<br>15 Capture Signature - Array of objects that have a file name and a link you can use to download that image. All links are only valid for 15 minutes, a new call will generate a new link.<br>16 Request Approval - Array of objects that have a file name and a link you can use to download that image. All links are only valid for 15 minutes, a new call will generate a new link.<br></div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>meta</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>This property is useful to get more information related to the Task Instructions. Different instruction types may have different properties in the meta section.<br>Instruction Type:<br>14 Start WO - If this instruction is completed on the task, the meta property would have an "associatedTask" property on it. The associatedTask gives the route for the task created by this instruction. For example, if task 2 was created by a "Start WO" instruction on task 1. In GET Task Instruction for task 1, this instruction would have a meta associatedTask property pointing to task 2.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/tasks/instructions?tasks=1,2,3,4,5,\
  6,7&limit=100&page=1"
method: GET
queryParams:
  - key: tasks
    value: 1,2,3,4,5,6,7
    description: "CSV of task IDs "
  - key: limit
    value: "100"
    description: Page size (1..1000)
  - key: page
    value: "1"
    description: Page-based pagination (mutually exclusive with cursor)
examples: ./.resources/Batch Task Instructions.resources/examples
order: 6000
