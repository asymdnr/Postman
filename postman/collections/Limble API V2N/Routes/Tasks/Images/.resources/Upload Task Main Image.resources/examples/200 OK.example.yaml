$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/tasks/:taskID/image"
  method: PUT
  pathVariables:
    taskID: "555"
  body:
    type: formdata
    content:
      - type: file
        key: image
        src: []
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
