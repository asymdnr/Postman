$kind: http-request
description: >-
  Lists WR submissions


  Return data description:


  | **Property** | **Description** |

  | --- | --- |

  | workRequestSubmissionId | The unique identifier of the work request
  submission. |

  | status | Pending, Approved or Rejected. |

  | createdByUserId | The unique identifier of the user who created the work
  request submission. |

  | createdAt | The date the work request submission was created. The timestamp
  is in the following format: YYYY-MM-DD (2025-07-02) HH:MM:SS (21:36:31) |

  | updatedAt | The date the work request submission was last updated. The
  timestamp is in the following format: YYYY-MM-DD (2025-07-02) HH:MM:SS
  (21:36:31) |

  | deletedAt | The date the work request submission was deleted. The timestamp
  is in the following format: YYYY-MM-DD (2025-07-02) HH:MM:SS (21:36:31) Will
  be NULL if the submission is not deleted. |

  | reviewedByUserId | The unique identifier of the user who reviewed the
  submission. |

  | reviewedAt | The date the work request submission was reviewed. The
  timestamp is in the following format: YYYY-MM-DD (2025-07-02) HH:MM:SS
  (21:36:31) Will be NULL if the submission has not yet been reviewed |

  | reviewedReason | The predefined reason the work request was declined. |

  | additionalNotes | Any additional notes the person who declined the
  submission wishes to leave. |

  | locationId | The unique identifier of the location the submission belongs
  to. |

  | assetId | The unique identifier of the asset associated with the submission.
  |

  | priorityId | The unique identifier of the priority of the submission. |

  | dueDateUnit | The unit of measure used to communicate when the task will be
  due. Can be “days” or “hours”. |

  | requestInformation | The information filled out in the Work Request Portal.
  Includes any of the following fields in JSON format. customerCode
  requesterName requesterEmail requesterPhone timeUnix customTag customFieldOne
  customFieldTwo customFieldThree customFieldOneTitle customFieldTwoTitle
  customFieldThreeTitle customFieldDropdownAnswerOne
  customFieldDropdownAnswerTwo customFieldDropdownAnswerThree
  customDropdownTitleOne customDropdownTitleTwo customDropdownTitleThree
  customDropdownOptionsOne customDropdownOptionsTwo customDropdownOptionsThree
  geoLocation |

  | customerID | The unique identifier of the customer account. |

  | requestTitle | The title of the submission. |

  | assignedToProfileId | The Limble profile the submission is assigned to. This
  is used to determine what team or individual is assigned to review the
  submission. |

  | requestDescription | The description of the problem filled out in the Work
  Request Portal. |

  | checklistID | The unique identifier of the task generated from the
  submission when it is approved. Will be NULL if submission status is declined
  or pending. |

  | requesterName | The name of the person who submitted the work request
  submission. |
url: "{{protocol}}://{{server}}:{{port}}/v2/work-requests/work-request-submissi\
  ons?orderBy=createdAt&locationIDs=1&statuses=open&limit=100&createdDateStart=\
  2025-06-20T20:51:13.000Z&createdDateEnd=2025-06-20T20:51:13.000Z&workRequestI\
  Ds=1,2,3&page=1&cursor=1"
method: GET
queryParams:
  - key: orderBy
    value: createdAt
    description: This parameter is used to order results by their createdAt, status,
      requestTitle, workRequestSubmissionID, and location property instead of
      the default ordering. each property can be flipped reverse by putting a
      minus before the property e.g. "-createdAt".
  - key: search
    value: pump
    disabled: true
    description: Free-text search
  - key: locationIDs
    value: "1"
    description: This parameter is used to only get work requests at a specific
      group of Locations. This parameter accepts a comma delimited list of
      Location IDs.
  - key: statuses
    value: open
    description: CSV of statuses
  - key: limit
    value: "100"
    description: Max rows
  - key: columns
    value: ""
    disabled: true
    description: CSV of field names (letters only); forwarded upstream as array
  - key: createdDateStart
    value: 2025-06-20T20:51:13.000Z
    description: ISO 8601 start
  - key: createdDateEnd
    value: 2025-06-20T20:51:13.000Z
    description: ISO 8601 end (≥ start)
  - key: workRequestIDs
    value: 1,2,3
    description: CSV of WR IDs
  - key: page
    value: "1"
    description: Page-based pagination (mutually exclusive with cursor)
  - key: cursor
    value: "1"
    description: Cursor for pagination (forbidden with page)
examples: ./.resources/List WR Submissions.resources/examples
order: 1000
