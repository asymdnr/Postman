$kind: http-request
description: |-
  This request updates the top level information of a Task.

  <table><tbody><tr><th>Parameter</th><th>Type</th><th>Required?</th><th>Description</th></tr><tr><td><div>name</div></td><td><div>String</div></td><td><div>Optional</div></td><td><div>The name of the task.</div></td></tr><tr><td><div>locationID</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>The location to which the task is assigned. Must be the location's unique ID number.</div></td></tr><tr><td><div>due</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>The time at which the task is due for completion. Must be a <a rel="noreferrer noopener nofollow" href="https://www.unixtimestamp.com" target="_blank">unix timestamp</a>.</div></td></tr><tr><td><div>type</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>The type of task according to this legend:<br>1 = Preventative Maintanance (PM).<br>2 = Unplanned Work Order (WO);<br>4 = Planned Work Order (WO);<br>6 = Work Request (WR).<br>Only these type of tasks can be changed from one task type to another.</div></td></tr><tr><td><div>description</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>A brief description about the task.</div></td></tr><tr><td><div>asset</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>The asset that the task will be attached to, if any. Must be the unique ID number of the asset. Omitting this parameter or setting it to zero will not attach the task to any asset.</div></td></tr><tr><td><div>assignment</div></td><td><div>Int</div></td><td><div>Optional. Required if 'assignmentType' is used.</div></td><td><div>The user or team to which the task will be assigned. Must be a user or team that exists at the specified location. Must be the unique ID number of the user or team. If this parameter is set, the assignmentType parameter must also be set.</div></td></tr><tr><td><div>assignmentType</div></td><td><div>Enum</div></td><td><div>Optional. Required if 'assignment' is used.</div></td><td><div>Specifies whether this task will be assigned to a 'user', 'team' or 'multi'. If this parameter is set, the assignment parameter must also be set.</div></td></tr><tr><td><div>priority</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>Specifies the priority of the task. Must be between 0 and 6 inclusive: 0 = lowest priority, 5 = highest priority, 6 = "On Hold".</div></td></tr><tr><td><div>estimatedTime</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>Updates the estimated time of the task. This is the time it takes to complete the task in minutes.</div></td></tr><tr><td><div>scheduledStart</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>The scheduled start date of the task. Must be a <a rel="noreferrer noopener nofollow" href="https://www.unixtimestamp.com" target="_blank">unix timestamp</a>. Must be 0 or greater.</div></td></tr><tr><td><div>scheduledEnd</div></td><td><div>Int</div></td><td><div>Optional</div></td><td><div>The scheduled end date of the task. Must be a <a rel="noreferrer noopener nofollow" href="https://www.unixtimestamp.com" target="_blank">unix timestamp</a>. Must be 0 or greater. If both scheduledStart and scheduledEnd are provided, scheduledEnd must be greater than scheduledStart.</div></td></tr><tr><td><div>requestName</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Specifies the name of the work requestor.</div></td></tr><tr><td><div>requestEmail</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Specifies the email address of the work requestor.</div></td></tr><tr><td><div>requestPhone</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Specifies the phone number of the work requestor.</div></td></tr><tr><td><div>requestDescription</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Specifies the description set by the work requestor.</div></td></tr><tr><td><div>status</div></td><td><div>int</div></td><td><div>Optional</div></td><td><div>1 - Closes a task.<br>0 - Opens a task.<br>If this parameter is set to 1, the assignment and assignmentType parameters must also be set.</div></td></tr><tr><td><div>meta1</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Task meta data. This does not show in the web application, but can be used to track items between integrated systems.</div></td></tr><tr><td><div>meta2</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Task meta data. This does not show in the web application, but can be used to track items between integrated systems.</div></td></tr><tr><td><div>meta3</div></td><td><div>string</div></td><td><div>Optional</div></td><td><div>Task meta data. This does not show in the web application, but can be used to track items between integrated systems.</div></td></tr><tr><td><div>geoLocation</div></td><td><div>geoJSON</div></td><td><div>Optional</div></td><td><div>The <a rel="noreferrer noopener nofollow" href="https://geojson.org" target="_blank">geoJSON</a> Feature object that can be used to locate a task on a Map. To remove geoLocation from a Task pass an empty object (<code>{}</code>).</div></td></tr><tr><td><div>statusID</div></td><td><div>int</div></td><td><div>Optional</div></td><td><div>Update the custom status of the task. Cannot update custom status to 1 (Open) or 2 (Complete).</div></td></tr><tr><td><div>multiUsers</div></td><td><div>array</div></td><td><div>Optional. Required if assignmentType = multi</div></td><td><div>Array list of users a task is being assigned to.</div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/tasks/:taskID"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  - key: taskID
    value: "{{taskID}}"
    description: taskID of the task you are updating
body:
  type: text
  content: |-
    {
        "name": "Do this task please!",
        "locationID": 163,
        "assetID": 1,
        "due": 1564605614,
        "type": 6,
        "assignment": 341,
        "assignmentType": "user",
        "priority": 3,
        "description": "this is a test task",
        "scheduledStart": 1564600000,
        "scheduledEnd": 1564610000,
        "requestName": "requtest name",
        "requestEmail": "requestemail@domain.com",
        "requestPhone": "1111111111",
        "requestDescription": "request description",
        "status": 1,
        "meta1": "meta1",
        "meta2": "meta2",
        "meta3": "meta3",
        "geoLocation": {
          "type": "Feature",
          "properties": {"name": "Salt Lake City"},
          "geometry": {
            "type": "Point",
            "coordinates": [
              -111.9012451171875,
              40.76962180287486
            ]
          }
        }
    }
scripts:
  - type: afterResponse
    code: "pm.test(\"response should be okay to process\", function () { \r

      \    pm.response.to.not.be.error; \r

      \    pm.response.to.not.have.jsonBody(\"error\"); \r

      });"
    language: text/javascript
examples: ./.resources/Update Task.resources/examples
order: 10000
