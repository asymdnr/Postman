$kind: http-request
description: >-
  This request creates a new Budget Step (sometimes called a PO Workflow Step).


  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr>
  			<td>name</td>
  			<td>String</td>
  			<td>Required</td>
  			<td>The title of this budget.</td>
  		</tr>
        <tr>
  			<td>assignmentType</td>
  			<td>Enum</td>
  			<td>Required</td>
  			<td>What type ('user' or 'team') should we interpret the assignment value as?</td>
  		</tr>
  		<tr>
  			<td>assignment</td>
  			<td>Int or Array of Ints</td>
  			<td>Required</td>
  			<td>When POs belonging to this step's budget enter this step, who will they be assigned to? If awaitingAssignmentType is 'team' then this <em>cannot be</em> an array, and may only be one number.</td>
  		</tr>
        <tr>
  			<td>emailSend</td>
  			<td>Boolean</td>
  			<td>Required</td>
  			<td>When POs of this step's budget enter this step, should we send email notification(s)?</td>
  		</tr>
          <tr>
  			<td>allowPOEdit</td>
  			<td>Boolean</td>
  			<td>Optional</td>
  			<td>When POs belonging to this step's budget are in this step, can the PO be edited?</td>
  		</tr>
  		<tr>
  			<td>allowPR</td>
  			<td>Boolean</td>
  			<td>Required</td>
  			<td>When POs belonging to this step's budget are in this step, can items be received?</td>
  		</tr>
  	</tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/budgets/:budgetID/steps"
method: POST
pathVariables:
  budgetID: "1"
body:
  type: json
  content: |
    {
        "name": "Very important step",
        "assignmentType": "user",
        "assignment": 341,
        "emailSend": false,
        "allowPR": true,
        "allowPOEdit": true
    }
examples: ./.resources/New Step.resources/examples
order: 1000
