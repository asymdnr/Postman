$kind: http-request
description: >-
  This request updates a Budget Step (sometimes called a PO Workflow Step).


  <table class="apiTable">
  	<thead>
  		<tr>
  			<th>Parameter</th>
  			<th>Type</th>
  			<th>Required?</th>
  			<th>Description</th>
  		</tr>
  	</thead>
  	<tbody>
  		<tr>
  			<td>name</td>
  			<td>String</td>
  			<td>Optional</td>
  			<td>The title of this budget.</td>
  		</tr>
        <tr>
  			<td>assignmentType</td>
  			<td>Enum</td>
  			<td>Optional</td>
  			<td>What type ('user' or 'team') should we interpret the assignment value as? This is required when the assignment property is present.</td>
  		</tr>
  		<tr>
  			<td>assignment</td>
  			<td>Int or Array of Ints</td>
  			<td>Optional</td>
  			<td>When POs belonging to this step's budget enter this step, who will they be assigned to? If awaitingAssignmentType is 'team' then this <em>cannot be</em> an array, and may only be one number. This is required when the assignmentType property is present.</td>
  		</tr>
        <tr>
  			<td>emailSend</td>
  			<td>Boolean</td>
  			<td>Optional</td>
  			<td>When POs of this step's budget enter this step, should we send email notification(s)?</td>
  		</tr>
  		<tr>
  			<td>allowPOEdit</td>
  			<td>Boolean</td>
  			<td>Optional</td>
  			<td>When POs belonging to this step's budget are in this step, can the PO be edited?</td>
  		</tr>
  		<tr>
  			<td>allowPR</td>
  			<td>Boolean</td>
  			<td>Optional</td>
  			<td>When POs belonging to this step's budget are in this step, can items be received?</td>
  		</tr>
  		<tr>
  			<td>order</td>
  			<td>Int</td>
  			<td>Optional</td>
  			<td>For the order of steps in this step's budget, which position should this step be in?</td>
  		</tr>
  	</tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/budgets/:budgetID/steps/:stepID"
method: PATCH
pathVariables:
  budgetID: "9"
  stepID: "10"
body:
  type: json
  content: |-
    {
        "name": "Get Approval",
        "assignmentType": "user",
        "assignment": 1,
        "emailSend": true,
        "allowPOEdit": true,
        "allowPR": false,
        "order": 1
    }
examples: ./.resources/Update Step.resources/examples
order: 4000
