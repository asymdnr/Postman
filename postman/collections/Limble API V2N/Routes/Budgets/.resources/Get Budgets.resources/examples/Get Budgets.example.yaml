$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/budgets?locations=1"
  method: GET
  queryParams:
    - key: cursor
      value: "0"
      disabled: true
      description: This parameter is a cursor that selects what budgetID you want to
        start receiving results at. e.g. passing 137 here will only get you
        budgets with an ID greater than 137.
    - key: limit
      value: "1"
      disabled: true
      description: This parameter is a result limiter. The default is set to return no
        more than 100 results at one time.
    - key: name
      value: "%General%"
      disabled: true
      description: This is a parameter used to string search for a name or partial
        name of a budget. This parameter expects a string with the wildcard %.
    - key: locations
      value: "1"
      description: This parameter is used to only get budgets that are linked to a
        location. This parameter accepts a comma delimited list of location IDs.
    - key: budgets
      value: 1,2,3
      disabled: true
      description: This parameter is used to only get specific budgets. This parameter
        accepts a comma delimited list of budget IDs.
