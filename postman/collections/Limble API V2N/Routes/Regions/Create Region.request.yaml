$kind: http-request
description: |-
  Creates a region.

  Parameters:

  | Parameter | In | Type | Required | Default | Description |
  |---|---|---|---|---|---|
  | name | body | string | yes |  | Region name |
  | parentRegionID | body | integer | no | 0 | Parent region (≥ 0) |

  Responses:
  - 201 Created: { regionID } with Location header.
url: "{{protocol}}://{{server}}:{{port}}/v2/regions"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "North Region",
      "parentRegionID": 0
    }
examples: ./.resources/Create Region.resources/examples
order: 2000
