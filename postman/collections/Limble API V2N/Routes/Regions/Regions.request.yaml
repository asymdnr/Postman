$kind: http-request
description: |-
  This request returns your Regions in Limble.  

  <b>Return data description</b>

  <table>
      <thead>
          <tr>
              <th>Property</th>
              <th>Description</th>
          </tr>
      </thead>
      <tbody>
          <tr>
              <td>regionID</td>
              <td>The ID of the Region</td>
          </tr>
          <tr>
              <td>regionName</td>
              <td>The name of the Region</td>
          </tr>
          <tr>
              <td>parentRegionID</td>
              <td>The regionID of the parent of a region. </td>
          </tr>
      </tbody>
  </table>
url: "{{protocol}}://{{server}}:{{port}}/v2/regions/?regions=1&name=%One%&curso\
  r=0&limit=100"
method: GET
queryParams:
  - key: regions
    value: "1"
    description: This parameter is used to only get regions in the list provided.
      This parameter accepts a comma delimited list of Region IDs.
  - key: name
    value: "%One%"
    description: >-
      This parameter is used to only get specific regions by name. This
      parameter expects a string- the full name of a region
       or partial name with the wildcard %.
  - key: cursor
    value: "0"
    description: >-
      This parameter is a cursor that selects what regionID you want to start
      receiving results at. e.g. passing 137 here will only get you regions
       with an id greater than 137.
  - key: limit
    value: "100"
    description: >-
      This parameter is a result limiter. The default is set to return no more
      than 100 

      results at one time.
examples: ./.resources/Regions.resources/examples
order: 1000
