$kind: http-request
description: This requests deletes a file attached to a log.
url: "{{protocol}}://{{server}}:{{port}}/v2/assets/logs/file/:fileID"
method: DELETE
pathVariables:
  - key: fileID
    value: "58"
    description: The ID of the file to be deleted.
examples: ./.resources/Delete Asset Log File.resources/examples
order: 1000
