$kind: http-request
description: Each asset can have one main image associated with it.  This
  request allows you to set that image.
url: "{{protocol}}://{{server}}:{{port}}/v2/assets/:assetID/image"
method: PUT
pathVariables:
  assetID: ""
body:
  type: formdata
  content:
    - type: file
      key: image
      src: /C:/Images/heic1509a.jpg
scripts:
  - type: afterResponse
    code: |
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Add Asset Main Image.resources/examples
order: 1000
