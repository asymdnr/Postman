$kind: http-request
description: This request removes an Asset from your Limble account.
url: "{{protocol}}://{{server}}:{{port}}/v2/assets/?assetID={{assetID}}"
method: DELETE
headers:
  Content-Type: application/json
queryParams:
  - key: assetID
    value: "{{assetID}}"
    description: assetID of the asset you are removing.
pathVariables:
  assetID: "{{assetID}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Delete Asset.resources/examples
order: 9000
