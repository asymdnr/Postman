$kind: http-request
description: >-
  This request gets detailed information about asset fields such as Make, Model
  and any other custom field.


  This call also returns "files" which is an array of objects that have a file
  name and a link you can use to download that file. All links are only valid
  for 15 minutes, a new call will generate a new link.


  **Note:** this endpoint supports pagination. Please refer to the
  [**Pagination**](#pagination) section for more information.
url: "{{protocol}}://{{server}}:{{port}}/v2/assets/fields/?assets=171"
method: GET
queryParams:
  - key: name
    value: Model
    disabled: true
    description: This parameter is used to only get specific field by name. This
      parameter expects a string full name of a field or partial name with the
      wildcard %.
  - key: fields
    value: "107"
    disabled: true
    description: This parameter can be used to get a single Asset Fields or a list
      of Asset Fields in a comma-separated list.
  - key: start
    value: "1555105636"
    disabled: true
    description: This parameter is used to only get Asset Fields for Assets that
      were last edited after the unix timestamp passed into the start parameter.
      For example, all Assets that were last edited after April 18th, 2018.
  - key: end
    value: "1555105636"
    disabled: true
    description: This parameter is used to only get Asset Fields for Assets that
      were last edited *before* the unix timestamp passed into the end
      parameter.
  - key: cursor
    value: "0"
    disabled: true
    description: This parameter is a cursor that selects what id you want to start
      receiving results at. e.g. passing 137 here will only get you asset fields
      with an id greater than 137.
  - key: limit
    value: "1"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
  - key: locations
    value: "163"
    disabled: true
    description: This parameter can be used to get a group of asset fields in a
      location in a comma-separated list.
  - key: value
    value: F250
    disabled: true
    description: This parameter is used to only get specific field by value. This
      parameter expects a string full name of a field or partial name with the
      wildcard %.
  - key: assetName
    value: "%fork%"
    disabled: true
    description: This parameter is used to only get specific fields by asset name.
      This parameter expects a string full name of a field or partial name with
      the wildcard %.
  - key: fieldType[0]
    value: Text
    disabled: true
    description: This parameter is used to only get specific fields by type. This
      parameter expects an array of strings "Text, Date, Pictures, Documents,
      Number, Currency, Dropdown"
  - key: fieldType[1]
    value: Documents
    disabled: true
    description: This parameter is used to only get specific fields by type. This
      parameter expects an array of strings "Text, Date, Pictures, Documents,
      Number, Currency, Dropdown"
  - key: page
    value: "1"
    disabled: true
    description: This parameter is used to paginate results based on the limit.
      Refer to Pagination section for more information.
  - key: values
    value: ""
    disabled: true
    description: This parameter is used to get asset fields by their valueID. This
      parameter expects a comma delimited list of Value IDs.
  - key: assets
    value: "171"
    description: This parameter can be used to get a group of asset fields for a
      specific set of asset ids in a comma-separated list.
scripts:
  - type: afterResponse
    code: |
      pm.test('gets asset fields', () => {
         const data = pm.response.json();
      });
    language: text/javascript
examples: ./.resources/Asset Fields.resources/examples
order: 1000
