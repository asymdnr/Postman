$kind: http-request
description: >-
  Any time an Asset's field is changed an entry is inserted into a history.  


  This request allows you to pull that information so you can see trends over
  time.
url: "{{protocol}}://{{server}}:{{port}}/v2/assets/fields/history"
method: GET
queryParams:
  - key: assets
    value: 4864, 4865
    disabled: true
    description: This parameter can be used to get a single Asset or a list of
      Assets in a comma-separated list.
  - key: fields
    value: 321, 202
    disabled: true
    description: This parameter can be used to get a single Asset Fields or a list
      of Asset Fields in a comma-separated list.
  - key: start
    value: "1555105636"
    disabled: true
    description: This parameter is used to only get Asset Fields for Assets that
      were last edited after the unix timestamp passed into the start parameter.
      For example, all Assets that were last edited after April 18th, 2018.
  - key: end
    value: "1555105636"
    disabled: true
    description: This parameter is used to only get Asset Fields for Assets that
      were last edited *before* the unix timestamp passed into the end
      parameter.
  - key: limit
    value: "100"
    disabled: true
    description: This parameter is a cursor that selects what id you want to start
      receiving results at. e.g. passing 137 here will only get you asset fields
      with an id greater than 137.
  - key: cursor
    value: "0"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
scripts:
  - type: afterResponse
    code: |-
      pm.test("response is created", () => {
          pm.response.to.have.status(200);
      });
    language: text/javascript
examples: ./.resources/Asset Field History.resources/examples
order: 3000
