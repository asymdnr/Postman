$kind: http-request
description: >-
  This request gets all possible fields an Asset can pick from when deciding
  which fields it should have.  


  To understand this concept, let's pretend you have the following assets:  


  Your first Asset (a Truck) has the fields Make, Model, and VIN.  


  Your second Asset (a HVAC) has the fields Make, Model, and Serial Number.  


  This would mean there are 4 suggested fields that exist:  Make, Model, VIN and
  Serial Number.  If I added a third new asset I could pick from any of the 4
  suggested fields.


  Suggested fields are the full list of possible fields that can be added to
  assets at that location.
url: "{{protocol}}://{{server}}:{{port}}/v2/assets/fields/suggested"
method: GET
queryParams:
  - key: fields
    value: "16"
    disabled: true
    description: This parameter can be used to get a single Asset Fields or a list
      of Asset Fields in a comma-separated list.
  - key: name
    value: "%S%"
    disabled: true
    description: This parameter is used to only get specific field by name. This
      parameter expects a string full name of a field or partial name with the
      wildcard %.
  - key: cursor
    value: "0"
    disabled: true
    description: This parameter is a cursor that selects what id you want to start
      receiving results at. e.g. passing 137 here will only get you asset fields
      with an id greater than 137.
  - key: limit
    value: "100"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
  - key: locations
    value: "163"
    disabled: true
    description: This parameter is used to only get fields at a specific group of
      Locations. This parameter accepts a comma delimited list of Location IDs.
scripts:
  - type: afterResponse
    code: "// example using pm.response.to.be*\r

      pm.test(\"response must be valid and have a body\", function () {\r

      \     // assert that the status code is 200\r

      \     pm.response.to.be.ok; // info, success, redirection,
      clientError,  serverError, are other variants\r

      \     // assert that the response has a valid JSON body\r

      \     pm.response.to.be.withBody;\r

      \     pm.response.to.be.json; // this assertion also checks if a
      body  exists, so the above check is not needed\r

      });"
    language: text/javascript
examples: ./.resources/Asset Suggested Fields.resources/examples
order: 2000
