$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/assets/:assetID/"
  method: PATCH
  headers:
    Content-Type: application/json
  pathVariables:
    assetID: "10728"
  body:
    type: text
    content: |
      {
      	"startedOn": 1541796015,
      	"hoursPerWeek": 30,
      	"name": "{{newAssetName}}",
           "geoLocation": {
            "type": "Feature",
            "properties": {
              "name": "Salt Lake City"
            },
            "geometry": {
              "type": "Point",
              "coordinates": [
                -111.9012451171875,
                40.76962180287486
              ]
            }
          }
          
      }
