$kind: http-request
description: |-
  This request returns a list of Part Asset Relations with top level information such as part, asset, qty, last edited, etc.

  **Note:** this endpoint supports pagination. Please refer to the [<b>Pagination</b>](#pagination) section for more information.

  <p><b>Return data description</b></p>

  <table><tbody><tr><th>Property</th><th>Description</th></tr><tr><td><div>relationID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Relations ID. e.g. 1</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>partID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The ID of the Part in this Relation</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>assetID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The ID of the Asset in this Relation</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>qty</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The qty of the Part related to this Asset</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>createdAt</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The unix timestamp at which this Relation was created</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>lastEdited</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The unix timestamp at which this Relation last saw a change</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>associationType</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The method used to create this Relation. At this time, only "manual" is supported</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/assets/parts"
method: GET
queryParams:
  - key: assets
    value: 172,253
    disabled: true
    description: This parameter is used to only get specific Assets. This parameter
      expects a comma delimited list of Asset IDs.
  - key: limit
    value: "3"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
  - key: page
    value: "3"
    disabled: true
    description: This parameter is used to paginate results based on the limit.
      Refer to Pagination section for more information.
  - key: cursor
    value: "49"
    disabled: true
    description: This parameter is a cursor that selects what ID you want to start
      receiving results at. Without ordering, this will return results with an
      ID greater than the value of cursor. With ordering, this will return
      results starting at the next item in the order, regardless of whether its
      ID is greater than or lesser than the value of cursor.
  - key: parts
    value: 46,172
    disabled: true
    description: This parameter is used to only get specific Parts. This parameter
      accepts a comma delimited list of part IDs.
  - key: relations
    value: 1,10
    disabled: true
    description: This parameter is used to only get specific relations. This
      parameter expects a comma delimited list of relation IDs.
  - key: start
    value: "1334570141"
    disabled: true
    description: This parameter is used to only get relations that were last edited
      after the unix timestamp passed into the start parameter. For example, all
      relations that were last edited after April 18th, 2018.
  - key: end
    value: "1784570141"
    disabled: true
    description: This parameter is used to only get relations that were last edited
      *before* the unix timestamp passed into the end parameter.
order: 1000
