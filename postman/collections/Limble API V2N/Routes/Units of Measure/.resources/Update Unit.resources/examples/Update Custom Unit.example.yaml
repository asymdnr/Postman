$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/uom/:unitCode"
  method: PATCH
  pathVariables:
    - key: unitCode
      value: E979vVp936_8kV0amzLre
      description: The unit identifier.
  body:
    type: json
    content: "{\r

      \    \"name\": \"Barrel\",\r

      \    \"abbreviation\": \"BRL\"\r

      }"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          "unitCode": "E979vVp936_8kV0amzLre",
          "name": "Barrel",
          "abbreviation": "BRL",
          "defaultAbbreviation": "BRL",
          "category": "count",
          "isCustom": true
      }
order: 1000
