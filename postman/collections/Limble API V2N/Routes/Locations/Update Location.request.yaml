$kind: http-request
description: |-
  This request updates a Location.

  **Body parameter descriptions**

  <table><tbody><tr><th>Parameter</th><th>Type</th><th>Required?</th><th>Description</th></tr><tr><td><div>name</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>String</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The new name of the Location.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>timezone</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The timezone this location resides in. This accepts a standard tz database name, see <a rel="noreferrer noopener nofollow" href="https://www.php.net/manual/en/timezones.php" target="_blank" url="https://www.php.net/manual/en/timezones.php">here.</a></div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>phone</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The phone number associated with this location.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>weeklyOperationHours</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Int</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The number of hours your Assets run at this location per week. This is used to help calculate MTBF.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>address</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The physical address of this location.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>address2</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The physical address of this location.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>geoLocation</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>geoJSON</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The <a rel="noreferrer noopener nofollow" href="https://geojson.org" target="_blank" url="https://geojson.org">geoJSON</a> Feature object that can be used to locate a Limble location on a Map.<br>To remove geoLocation from a Limble Location pass an empty object ( <code>{}</code>).</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>currencyCode</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The ISO code for the currency at this location. For example: "USD".</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/locations/:locationID"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  - key: locationID
    value: "163"
    description: locationID of the location you are updating.
body:
  type: text
  content: "{\r

    \t\"name\": \"NYC\",\r

    \t\"timezone\":\"America/Denver\",\r

    \t\"phone\":\"8015555555\",\r

    \t\"address\":\"3290 W Mayflower Ave\",\r

    \t\"address2\":\"Lehi, Utah, 84043\",\r

    \t\"weeklyOperationHours\": 41,\r

    \    \"geoLocation\": {\r

    \      \"type\": \"Feature\",\r

    \      \"properties\": {\r

    \        \"name\": \"Salt Lake City\"\r

    \      },\r

    \      \"geometry\": {\r

    \        \"type\": \"Point\",\r

    \        \"coordinates\": [\r

    \          -111.9012451171875,\r

    \          40.76962180287486\r

    \          ]\r

    \          }\r

    \    },\r

    \    \"currencyCode\": \"USD\"\r

    }\r

    \r\n"
scripts:
  - type: beforeRequest
    code: pm.globals.set('newLocationName', `new location -
      ${Math.floor(Math.random() * 10000000)}`);
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"response should be okay to process\", function () { \r

      \    pm.response.to.not.be.error; \r

      \    pm.response.to.not.have.jsonBody(\"error\"); \r

      });"
    language: text/javascript
examples: ./.resources/Update Location.resources/examples
order: 3000
