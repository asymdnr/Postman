$kind: http-request
description: |-
  This request creates a new Location.

  **Body parameter descriptions**

  <table><tbody><tr><th>Parameter</th><th>Type</th><th>Required?</th><th>Description</th></tr><tr><td><div>name</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>String</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Required</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The new name of the Location.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>timezone</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Required</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The timezone this location resides in. This accepts a standard tz database name, see <a rel="noreferrer noopener nofollow" href="https://en.wikipedia.org/wiki/List_of_tz_database_time_zones" target="_blank" url="https://en.wikipedia.org/wiki/List_of_tz_database_time_zones">here.</a></div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>phone</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Required</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The phone number associated with this location.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>weeklyOperationHours</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Int</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The hours per week this location operates.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>address</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The physical address of this location.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>address2</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The physical address of this location.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>geoLocation</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>geoJSON</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The <a rel="noreferrer noopener nofollow" href="https://geojson.org" target="_blank" url="https://geojson.org">geoJSON</a> Feature object that can be used to locate a Limble location on a Map.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>extraNotificationsEmail</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Include an email address to receive notifications for the location.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>currencyCode</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>string</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>Optional</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The ISO code for the currency at this location. For example: "USD".</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/locations"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: "{\r

    \t\"name\":\"{{newLocationName}}\",\r

    \t\"timezone\":\"America/Denver\",\r

    \t\"phone\":\"8015555555\",\r

    \t\"address\":\"3290 W Mayflower Ave\",\r

    \t\"address2\":\"Lehi, Utah, 84043\",\r

    \t\"weeklyOperationHours\": 40,\r

    \    \"geoLocation\": {\r

    \        \"type\":\"Feature\",\r

    \        \"properties\":{\r

    \            \"name\":\"Lehi\"\r

    \            },\r

    \        \"geometry\":{\r

    \            \"type\":\"Point\",\r

    \            \"coordinates\":[-111.84906005859375,40.39075031913329]\r

    \        }\r

    \    },\r

    \    \"currencyCode\": \"USD\"  \r

    }\r\n"
scripts:
  - type: beforeRequest
    code: pm.globals.set('newLocationName', `new location -
      ${Math.floor(Math.random() * 10000000)}`);
    language: text/javascript
  - type: afterResponse
    code: >
      const locationID = pm.response.json().locationID;


      pm.test("response is created", () => {
          pm.response.to.have.status(201);
      });


      pm.test("location header is valid", () => {
          const locationHeader = postman.getResponseHeader('Location')
          pm.expect(locationHeader).to.eql(`/v2/locations/?locations=${locationID}`);
      });


      pm.globals.set('locationID', locationID);
    language: text/javascript
examples: ./.resources/New Location.resources/examples
order: 2000
