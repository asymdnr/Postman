$kind: http-request
description: |-
  This request returns your Locations in Limble.

  **Note:** this endpoint supports pagination. Please refer to the [**Pagination**](https://desktop.postman.com/?desktopVersion=9.31.0&userId=16480856&teamId=206430) section for more information.

  **Note:** this endpoint supports pagination. Please refer to the [<b>Pagination</b>](https://desktop.postman.com/?desktopVersion=9.31.0&userId=16480856&teamId=206430) section for more information.

  EndFragment

  **Return data description**

  <table><tbody><tr><th>Property</th><th>Description</th></tr><tr><td><div>name</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The name of the Location</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>regionID</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The ID of the region the Location is part of. A regionID of 0 means the location is not a part of any region.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>timezone</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The Timezone the location is set at.<a rel="noreferrer noopener nofollow" href="https://www.php.net/manual/en/timezones.php" target="_blank" url="https://www.php.net/manual/en/timezones.php">List of Timezones</a></div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>weeklyOperationHours</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The number of hours your Assets run at this location per week. This is used to help calculate MTBF.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>workRequestPortal</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>This is a URL you can use to submit Work Requests to this Location.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>geoLocation</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The location of a Limble location on a Map.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr><tr><td><div>currencyCode</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td><td><div>The ISO code for the currency at this location.</div><div contenteditable="false"><div><div><div></div></div></div><div></div></div></td></tr></tbody></table>
url: "{{protocol}}://{{server}}:{{port}}/v2/locations/"
method: GET
queryParams:
  - key: locations
    value: "73"
    disabled: true
    description: This parameter is used to only get locations in the list provided.
      This parameter accepts a comma delimited list of Location IDs.
  - key: name
    value: "%NY%"
    disabled: true
    description: This parameter is used to only get specific locations by name. This
      parameter expects a string full name of a location or partial name with
      the wildcard %.
  - key: cursor
    value: "0"
    disabled: true
    description: This parameter is a cursor that selects what locationID you want to
      start receiving results at. e.g. passing 137 here will only get you
      locations with an id greater than 137.
  - key: limit
    value: "1"
    disabled: true
    description: This parameter is a result limiter. The default is set to return no
      more than 100 results at one time.
  - key: regions
    value: "0"
    disabled: true
    description: |-
      This parameter is used to get locations that belong to a region.
      This parameter expects a regionID a location may belong to.
  - key: geoLocation
    value: "true"
    disabled: true
    description: This parameter is used to filter results that contain a geoLocation
      property. By default it is false and will return **all** locations with
      and without geoLocation property. If true, it will only return locations
      with a geoLocation property.
  - key: page
    value: "1"
    disabled: true
scripts:
  - type: afterResponse
    code: >-
      // const firstLocation = pm.response.json()[0];


      // pm.test('gets assets', () => {

      //   pm.expect(firstLocation.name).to.eql('NY - Facility 1');

      // });


      // pm.globals.set('locationID', firstLocation.id);


      pm.test("response must be valid and have a body", function () {
           // assert that the status code is 200
           pm.response.to.be.ok; // info, success, redirection, clientError,  serverError, are other variants
           // assert that the response has a valid JSON body
           pm.response.to.be.withBody;
           pm.response.to.be.json; // this assertion also checks if a body  exists, so the above check is not needed
      });
    language: text/javascript
examples: ./.resources/Locations.resources/examples
order: 1000
