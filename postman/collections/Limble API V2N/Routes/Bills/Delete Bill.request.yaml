$kind: http-request
description: This request deletes a Bill. This will also delete any Bill
  transactions for PO Items that were received on this Bill. The qty and price
  of the PO Items on the Bill will be recalculated.
url: "{{protocol}}://{{server}}:{{port}}/v2/bills/:billID"
method: DELETE
pathVariables:
  - key: billID
    value: "226"
    description: The ID of the Bill to be deleted.
examples: ./.resources/Delete Bill.resources/examples
order: 6000
