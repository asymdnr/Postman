$kind: http-example
request:
  url: "{{protocol}}://{{server}}:{{port}}/v2/statuses"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "name": "Blocked",
        "description": "Task is blocked by external dependencies",
        "sortOrder": 3
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: text
    content: >-
      {
        "success": false,
        "message": "Validation error: name is required and must be 1-100 characters"
      }
order: 3000
